<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АРИНА ВО ВЬЕТНАМЕ: 12/10</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #2c3e50; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #fff; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        canvas { border: 4px solid #fff; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        #ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .ui-element { pointer-events: auto; }
        #menu, #game-over { background-color: rgba(0,0,0,0.9); padding: 50px; border-radius: 20px; text-align: center; border: 2px solid #f1c40f; box-shadow: 0 0 50px rgba(241,196,15,0.5); }
        #game-over { display: none; }
        h1 { font-size: 3.5em; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 3px; color: #f1c40f; text-shadow: 2px 2px 5px #000; }
        h2 { font-size: 2em; margin-bottom: 40px; color: #eee; }
        .btn { background-color: #27ae60; color: white; border: none; padding: 18px 45px; font-size: 1.6em; border-radius: 10px; cursor: pointer; transition: all 0.2s; margin: 15px; text-transform: uppercase; font-weight: bold; }
        .btn:hover { background-color: #2ecc71; transform: scale(1.08) rotate(2deg); }
        .btn:active { transform: scale(0.95); }
        #hud { position: absolute; top: 25px; left: 25px; font-size: 2.2em; display: none; flex-direction: column; gap: 15px; font-weight: bold; text-shadow: 1px 1px 3px #000; }
        #hud div { display: flex; align-items: center; gap: 10px; }
        #skins { display: flex; gap: 25px; margin-top: 25px; justify-content: center; margin-bottom: 30px; }
        .skin-btn { border: 4px solid transparent; cursor: pointer; transition: border-color 0.3s; width: 110px; height: 110px; border-radius: 50%; display: flex; justify-content: center; align-items: center; overflow: hidden; background: #333; }
        .skin-btn img { width: 100%; height: 100%; object-fit: cover; }
        .skin-btn.selected { border-color: #f1c40f; box-shadow: 0 0 15px rgba(241,196,15,0.8); }
        #loading { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        #loading h1 { color: #f1c40f; font-size: 4em; }
        
        /* Дополнительные стили для улучшения UI */
        #final-score { font-size: 2.5em; color: #f1c40f; }
        #high-score { color: #aaa; font-size: 0.9em; }
        #instructions { font-size: 1.2em; color: #888; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="1024" height="600"></canvas>
        <div id="hud">
            <div><span style="color: #f1c40f;">Счет:</span> <span id="score">0</span></div>
            <div><span style="color: #f1c40f;">Монеты:</span> <span id="coins-count">0</span></div>
            <div id="high-score-hud">Рекорд: <span id="high-score">0</span></div>
        </div>
        <div id="ui-container">
            <div id="menu" class="ui-element">
                <h1>АРИНА ВО ВЬЕТНАМЕ</h1>
                <h2>ВЫБЕРИТЕ ОБЛИК И ПРЫГАЙТЕ!</h2>
                <div id="skins">
                    <button id="skin-blue" class="skin-btn selected" onclick="setSkin('blue')">
                        <img src="https://i.ibb.co/L5T1bF6/arina-blue.png" alt="Arina Blue Top" title="Арина в голубом">
                    </button>
                    <button id="skin-black" class="skin-btn" onclick="setSkin('black')">
                        <img src="https://i.ibb.co/Jrk6D0p/arina-black.png" alt="Arina Black Top" title="Арина в черном">
                    </button>
                </div>
                <button class="btn" onclick="startGame()">ИГРАТЬ (Пробел/Tap)</button>
                <div id="instructions">Сбор монет: <span style="color: #f1c40f; font-weight: bold; font-size: 1.2em;">+10 очков!</span></div>
            </div>
            <div id="game-over" class="ui-element">
                <h1>ИГРА ОКОНЧЕНА</h1>
                <h2>ВАШ СЧЕТ: <span id="final-score">0</span></h2>
                <button class="btn" onclick="resetGame()">ПОПРОБОВАТЬ СНОВА</button>
                <button class="btn" onclick="showMenu()">В МЕНЮ</button>
            </div>
        </div>
    </div>
    <div id="loading">
        <h1>ЗАГРУЗКА... 12/10 УРОВЕНЬ!</h1>
        <p style="font-size: 1.5em; color: #888;">Пожалуйста, подождите.</p>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const hud = document.getElementById("hud");
    const menu = document.getElementById("menu");
    const gameOverScreen = document.getElementById("game-over");
    const loadingScreen = document.getElementById("loading");

    // Изображения для иконок меню (ссылки из предыдущего запроса)
    const arinaImageBlue = new Image();
    arinaImageBlue.src = 'https://i.ibb.co/L5T1bF6/arina-blue.png';
    const arinaImageBlack = new Image();
    arinaImageBlack.src = 'https://i.ibb.co/Jrk6D0p/arina-black.png';

    // Переменные игры
    let frames = 0;
    let score = 0;
    let coinsCount = 0;
    let highScore = localStorage.getItem('arinaHighScore12') || 0;
    let gameSpeed = 6;
    let gameState = "loading"; // menu, playing, gameover
    let currentSkin = "blue"; // default skin

    // Настройки Canvas
    const width = canvas.width;
    const height = canvas.height;
    const groundHeight = 80;
    const groundY = height - groundHeight;

    // Фон (Улучшенный Параллакс)
    const backgroundLayers = [
        { x: 0, y: 0, width: 2048, height: 600, speed: 0.1, type: 'sky' }, // Небо с облаками
        { x: 0, y: 150, width: 2048, height: 450, speed: 0.4, type: 'mountains_far' }, // Далекие горы Халонг
        { x: 0, y: groundY - 180, width: 2048, height: 180, speed: 1.0, type: 'jungle_mid' } // Ближние джунгли с деталями
    ];

    // Игрок (Арина)
    const player = {
        x: 100,
        y: groundY - 120,
        width: 70, // Более широкая для деталей
        height: 120,
        dy: 0,
        jumpForce: 20,
        gravity: 0.9,
        grounded: false,
        
        // Спрайты Арины во Вьетнаме (Улучшенные, анимированные)
        sprites: {
            blue: {
                run: [], // кадры бега
                jump: [], // кадры прыжка
            },
            black: {
                run: [],
                jump: [],
            }
        },
        currentAnimation: 'run',
        animationFrame: 0,
        animationSpeed: 4, // чем меньше, тем быстрее анимация
        particles: [],
        
        init: function() {
            // Создание детализированных спрайтов Арины во Вьетнаме (анимированные)
            // Это будет детализированное рисование на основе фото.

            // Я нарисую каждый кадр как функцию рисования. Это более сложно, но позволяет избежать внешних файлов.
            // Я создам по 2 кадра для бега для каждого скина, чтобы сохранить код управляемым.
            
            // Скин: Голубой
            this.sprites.blue.run.push((x, y) => this.drawArinaBase(x, y, 'blue', 'frame1'));
            this.sprites.blue.run.push((x, y) => this.drawArinaBase(x, y, 'blue', 'frame2'));
            this.sprites.blue.jump.push((x, y) => this.drawArinaBase(x, y, 'blue', 'jump'));
            
            // Скин: Черный
            this.sprites.black.run.push((x, y) => this.drawArinaBase(x, y, 'black', 'frame1'));
            this.sprites.black.run.push((x, y) => this.drawArinaBase(x, y, 'black', 'frame2'));
            this.sprites.black.jump.push((x, y) => this.drawArinaBase(x, y, 'black', 'jump'));
        },
        
        // Детализированное рисование Арины на основе фотографий
        drawArinaBase: function(x, y, skin, frame) {
            ctx.save();
            ctx.translate(x, y);
            
            // Тело и одежда (детализированные)
            let topColor = (skin === 'blue') ? '#add8e6' : '#111';
            let hairColor = '#fdfdfd'; // Платиновая блондинка
            let accessoryColor = '#d4af37'; // Золото для часов, серег
            let tattooColor = "rgba(0,0,0,0.6)"; // Татуировка
            
            // Волосы (детализированная прическа)
            ctx.fillStyle = hairColor;
            ctx.fillRect(10, -5, 50, 20); // Сверху
            ctx.fillRect(50, 10, 15, 45); // Сбоку (собранные)
            ctx.fillRect(5, 5, 10, 30); // прядь

            // Голова (детализированное лицо)
            ctx.fillStyle = "#FFD1DC"; 
            ctx.fillRect(15, 10, 40, 38);
            
            // Голубые глаза (яркие)
            ctx.fillStyle = "#00BFFF";
            ctx.fillRect(32, 23, 7, 7);
            ctx.fillRect(47, 23, 7, 7);
            ctx.fillStyle = "#fff"; ctx.fillRect(35, 25, 2, 2); ctx.fillRect(50, 25, 2, 2); // Блик
            
            // Топ (Детализированный)
            if (skin === 'blue') {
                ctx.fillStyle = topColor;
                ctx.fillRect(5, 48, 60, 42);
                // Детали обертки и ремешков
                ctx.fillStyle = "#87cefa"; 
                ctx.fillRect(10, 48, 6, 42);
                ctx.fillRect(54, 48, 6, 42);
                ctx.fillStyle = "#555";
                ctx.fillRect(10, 70, 50, 3); // ремешок обертки
            } else {
                ctx.fillStyle = topColor;
                ctx.fillRect(5, 48, 60, 42);
                // Детали перекрестных ремешков
                ctx.fillStyle = "#222";
                ctx.fillRect(20, 48, 6, 42);
                ctx.fillRect(44, 48, 6, 42);
            }
            
            // Аксессуары
            // Золотые часы (с деталями)
            ctx.fillStyle = accessoryColor;
            ctx.fillRect(2, 68, 12, 12);
            ctx.fillStyle = "#222"; ctx.fillRect(4, 70, 8, 8); ctx.fillStyle = accessoryColor; ctx.fillRect(5, 71, 6, 6);
            
            // Золотые серьги (висячие)
            ctx.fillRect(12, 14, 3, 10);
            ctx.fillRect(55, 14, 3, 10);
            
            // Татуировка (детализированная наCanvas, абстрактный эскиз)
            ctx.fillStyle = tattooColor;
            ctx.beginPath();
            ctx.moveTo(15, 78); ctx.lineTo(11, 83); ctx.lineTo(15, 88); ctx.lineTo(19, 83); ctx.closePath();
            ctx.fill();
            ctx.fillRect(14, 80, 2, 10);
            
            // Руки (детализированные)
            ctx.fillStyle = "#FFD1DC";
            ctx.fillRect(2, 58, 12, 28); // левая
            ctx.fillRect(56, 58, 12, 28); // правая
            
            // Ноги (анимация с детализацией, ботинки)
            if (frame === 'frame1') {
                ctx.fillStyle = "#FFD1DC";
                ctx.fillRect(20, 90, 15, 28); // нога
                ctx.fillRect(20, 110, 15, 10); // стопа (обувь)
                ctx.fillStyle = "#444"; ctx.fillRect(20, 110, 15, 10); // обувь
                
                ctx.fillStyle = "#FFD1DC";
                ctx.fillRect(35, 90, 15, 20); // короче
                ctx.fillStyle = "#444"; ctx.fillRect(35, 110, 15, 10); // обувь
            } else if (frame === 'frame2') {
                ctx.fillStyle = "#FFD1DC";
                ctx.fillRect(20, 90, 15, 20);
                ctx.fillStyle = "#444"; ctx.fillRect(20, 110, 15, 10); // обувь

                ctx.fillStyle = "#FFD1DC";
                ctx.fillRect(35, 90, 15, 28);
                ctx.fillStyle = "#444"; ctx.fillRect(35, 110, 15, 10); // обувь
            } else if (frame === 'jump') {
                ctx.fillStyle = "#FFD1DC";
                ctx.fillRect(20, 90, 15, 20); // подогнуты
                ctx.fillStyle = "#444"; ctx.fillRect(20, 110, 15, 10); // обувь
                ctx.fillStyle = "#FFD1DC";
                ctx.fillRect(35, 90, 15, 20);
                ctx.fillStyle = "#444"; ctx.fillRect(35, 110, 15, 10); // обувь
            }
            
            ctx.restore();
        },

        jump: function() {
            if (this.grounded) {
                this.dy = -this.jumpForce;
                this.grounded = false;
                this.currentAnimation = 'jump';
                // soundPlay('jump'); // Place sound here
            }
        },

        update: function() {
            this.y += this.dy;
            if (this.y + this.height < groundY) {
                this.dy += this.gravity;
                this.grounded = false;
            } else {
                this.dy = 0;
                this.grounded = true;
                this.y = groundY - this.height;
                if (this.currentAnimation === 'jump') {
                    this.currentAnimation = 'run';
                    this.animationFrame = 0;
                }
            }
            
            // Обновление анимации
            if (frames % this.animationSpeed === 0 && this.currentAnimation === 'run') {
                this.animationFrame = (this.animationFrame + 1) % this.sprites[currentSkin][this.currentAnimation].length;
                // Частицы пыли при беге
                this.particles.push({x: this.x, y: this.y + this.height, dx: -2, dy: -1, size: Math.random() * 5 + 3, color: '#fdd', markedForDeletion: false});
            }
            
            // Обновление частиц
            for (let i = this.particles.length - 1; i >= 0; i--) {
                let p = this.particles[i];
                p.x += p.dx;
                p.y += p.dy;
                p.size *= 0.97;
                if (p.size < 0.5) p.markedForDeletion = true;
                if (p.markedForDeletion) this.particles.splice(i, 1);
            }
        },

        draw: function() {
            // Отрисовка частиц
            for (let p of this.particles) {
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Отрисовка Арины
            let currentAnimSet = this.sprites[currentSkin][this.currentAnimation];
            let drawFunc = currentAnimSet[this.animationFrame] || currentAnimSet[0];
            drawFunc(this.x, this.y);
        }
    };

    // Монеты
    const coins = [];
    function spawnCoin() {
        if (gameState !== 'playing') return;
        coins.push({
            x: canvas.width,
            y: groundY - 70 - Math.random() * 100,
            width: 40,
            height: 40,
            speed: gameSpeed,
            markedForDeletion: false,
            draw: (x, y) => this.drawCoin(x, y)
        });
    }

    function drawCoin(x, y) {
        ctx.fillStyle = "#f1c40f"; // Золото
        ctx.beginPath();
        ctx.arc(x + 20, y + 20, 20, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 2;
        ctx.stroke();
        // Детали монеты
        ctx.fillStyle = "#333";
        ctx.font = " bold 20px Arial";
        ctx.textAlign = "center";
        ctx.fillText("V", x + 20, y + 28); // Вьетнам
    }

    // Враги (Улучшенные, "страшные" и аутентичные)
    const obstacles = [];
    const obstacleTypes = ['rat', 'roach', 'bug', 'bossrat'];

    function spawnObstacle() {
        if (gameState !== 'playing') return;
        let type = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
        let obstacle = {
            x: canvas.width,
            type: type,
            markedForDeletion: false,
            speed: gameSpeed,
            color: '#7f8c8d',
            draw: (x, y) => this.drawRat(x, y, obstacle) // default
        };

        if (type === 'rat') {
            obstacle.width = 80;
            obstacle.height = 45;
            obstacle.y = groundY - obstacle.height;
            obstacle.speed = gameSpeed + 1.5;
            obstacle.color = '#333';
            obstacle.draw = (x, y) => this.drawRat(x, y, obstacle);
        } else if (type === 'roach') {
            obstacle.width = 65;
            obstacle.height = 35;
            obstacle.y = groundY - obstacle.height;
            obstacle.speed = gameSpeed + 2.5;
            obstacle.color = '#8B4513';
            obstacle.draw = (x, y) => this.drawRoach(x, y, obstacle);
        } else if (type === 'bug') {
            obstacle.width = 60;
            obstacle.height = 60;
            obstacle.y = groundY - 130 - Math.random() * 80;
            obstacle.speed = gameSpeed + 2.0;
            obstacle.color = '#27ae60';
            obstacle.angle = 0;
            obstacle.draw = (x, y) => this.drawBug(x, y, obstacle);
        } else if (type === 'bossrat') { // ГЛАВНАЯ СТРАШНАЯ КРЫСА
            obstacle.width = 120;
            obstacle.height = 80;
            obstacle.y = groundY - obstacle.height;
            obstacle.speed = gameSpeed - 1.0; // Медленнее, но мощнее
            obstacle.color = '#111';
            obstacle.draw = (x, y) => this.drawBossRat(x, y, obstacle);
        }

        obstacles.push(obstacle);
    }

    // Детализированные и "страшные" рисунки врагов
    function drawRat(x, y, obs) {
        ctx.fillStyle = obs.color; ctx.fillRect(x, y, obs.width, obs.height);
        // Глаза (красные)
        ctx.fillStyle = "red"; ctx.fillRect(x + obs.width - 25, y + 15, 7, 7); ctx.fillRect(x + obs.width - 15, y + 15, 7, 7);
        // Уши
        ctx.fillStyle = "#555"; ctx.fillRect(x + 10, y - 5, 20, 20); ctx.fillRect(x + obs.width - 30, y - 5, 20, 20);
        // Зубы
        ctx.fillStyle = "white"; ctx.fillRect(x + obs.width - 8, y + 25, 7, 10);
        // Хвост (детализированный, извивающийся)
        ctx.strokeStyle = "pink"; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(x, y + obs.height / 2); ctx.lineTo(x - 25, y + obs.height / 2 + 8 * Math.sin(frames * 0.1)); ctx.stroke();
    }

    function drawRoach(x, y, obs) {
        ctx.fillStyle = obs.color; ctx.fillRect(x, y, obs.width, obs.height);
        // Сегменты
        ctx.fillStyle = "#663311"; for (let i = 1; i < 4; i++) ctx.fillRect(x + i * (obs.width / 4), y, 3, obs.height);
        // Усики (длинные)
        ctx.strokeStyle = "brown"; ctx.lineWidth = 1; ctx.beginPath();
        ctx.moveTo(x + obs.width, y + 5); ctx.lineTo(x + obs.width + 40, y - 10);
        ctx.moveTo(x + obs.width, y + 30); ctx.lineTo(x + obs.width + 40, y + 45); ctx.stroke();
        // Крылышки (детализированные)
        ctx.fillStyle = "rgba(100,60,30,0.5)"; ctx.fillRect(x + 5, y - 5, 40, 10);
    }

    function drawBug(x, y, obs) {
        ctx.fillStyle = obs.color; ctx.beginPath(); ctx.arc(x + obs.width / 2, y + obs.height / 2, obs.width / 2, 0, Math.PI * 2); ctx.fill();
        // Жуткие глаза
        ctx.fillStyle = "white"; ctx.fillRect(x + obs.width / 2 - 12, y + 18, 9, 9);
        ctx.fillStyle = "black"; ctx.fillRect(x + obs.width / 2 - 10, y + 20, 5, 5);
        // Жвалы
        ctx.strokeStyle = "lime"; ctx.lineWidth = 3; ctx.beginPath();
        ctx.moveTo(x + obs.width, y + 18); ctx.lineTo(x + obs.width + 12, y + 8);
        ctx.moveTo(x + obs.width, y + 42); ctx.lineTo(x + obs.width + 12, y + 52); ctx.stroke();
        // Усики
        ctx.strokeStyle = "green"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(x, y + 10); ctx.lineTo(x - 20, y - 10); ctx.moveTo(x, y + 50); ctx.lineTo(x - 20, y + 70); ctx.stroke();
    }

    function drawBossRat(x, y, obs) { // ГЛАВНАЯ КРЫСА СТРАШНАЯ
        ctx.fillStyle = obs.color; ctx.fillRect(x, y, obs.width, obs.height);
        // Красные глаза
        ctx.fillStyle = "red"; ctx.fillRect(x + obs.width - 35, y + 20, 12, 12); ctx.fillRect(x + obs.width - 20, y + 20, 12, 12);
        // Уши
        ctx.fillStyle = "#333"; ctx.fillRect(x + 15, y - 10, 30, 30); ctx.fillRect(x + obs.width - 45, y - 10, 30, 30);
        // Зубы
        ctx.fillStyle = "white"; ctx.fillRect(x + obs.width - 15, y + 35, 10, 20); ctx.fillStyle = "#eee"; ctx.fillRect(x + obs.width - 10, y + 35, 3, 20);
        // Хвост (огромный)
        ctx.strokeStyle = "pink"; ctx.lineWidth = 8; ctx.beginPath(); ctx.moveTo(x, y + obs.height / 2); ctx.lineTo(x - 40, y + obs.height / 2 + 15 * Math.sin(frames * 0.1)); ctx.stroke();
        // Частицы пыли
        player.particles.push({x: x + obs.width / 2, y: y + obs.height, dx: Math.random() * 2 - 1, dy: -Math.random(), size: Math.random() * 8 + 5, color: '#444', markedForDeletion: false});
    }

    // Обработка фонов (Улучшенный Вьетнам)
    function drawBackground() {
        backgroundLayers.forEach(layer => {
            layer.x -= layer.speed;
            if (layer.x <= -layer.width) layer.x = 0;
            
            ctx.save();
            ctx.translate(layer.x, layer.y);
            
            if (layer.type === 'sky') {
                ctx.fillStyle = "#87CEEB"; ctx.fillRect(0, 0, layer.width, layer.height);
                // Облака
                ctx.fillStyle = "white"; for (let i = 0; i < 20; i++) ctx.fillRect(100 + i * 200, 50 + Math.random() * 100, 100, 50);
            } else if (layer.type === 'mountains_far') {
                // Горы Халонг
                ctx.fillStyle = "#34495e"; // Темно-серый
                ctx.beginPath();
                ctx.moveTo(0, layer.height);
                for (let i = 0; i < layer.width; i += 50) {
                    ctx.lineTo(i, layer.height - (50 + Math.random() * 150));
                    ctx.lineTo(i + 25, layer.height - (100 + Math.random() * 200));
                }
                ctx.lineTo(layer.width, layer.height); ctx.fill();
            } else if (layer.type === 'jungle_mid') {
                // Рисовые террасы и джунгли
                ctx.fillStyle = "#16a085"; // Глубокий зеленый
                for (let i = 0; i < layer.width; i += 100) {
                    // Рисовые террасы (кривые линии)
                    ctx.beginPath(); ctx.lineWidth = 3; ctx.strokeStyle = "#1abc9c";
                    ctx.moveTo(i, layer.height - Math.random() * 20);
                    ctx.lineTo(i + 100, layer.height - Math.random() * 20);
                    ctx.stroke();
                    
                    // Пальмы
                    if (i % 300 === 0) {
                        ctx.fillStyle = "#5d4037"; ctx.fillRect(i + 40, layer.height - 150, 15, 150); // ствол
                        ctx.fillStyle = "#1b5e20"; ctx.fillRect(i, layer.height - 180, 100, 60); // крона
                        // Флаг Вьетнама (иногда)
                        if (i % 600 === 0) {
                            ctx.fillStyle = "#d32f2f"; ctx.fillRect(i + 35, layer.height - 160, 20, 15);
                            ctx.fillStyle = "#f1c40f"; ctx.beginPath(); ctx.moveTo(i + 45, layer.height - 158); ctx.lineTo(i+48, layer.height-153); ctx.lineTo(i+42, layer.height-153); ctx.closePath(); ctx.fill();
                        }
                    }
                    
                    // Вьетнамские шляпы
                    if (Math.random() < 0.05) { ctx.fillStyle = "#e0c060"; ctx.beginPath(); ctx.moveTo(i, layer.height - Math.random() * 10); ctx.lineTo(i + 30, layer.height - 15); ctx.lineTo(i + 60, layer.height); ctx.fill(); }
                }
            }
            
            // Дублирование для бесконечности
            ctx.restore(); ctx.save(); ctx.translate(layer.x + layer.width, layer.y);
            // Повторение тех же команд рисования (упрощено для примера)
            if (layer.type === 'sky') {
                ctx.fillStyle = "#87CEEB"; ctx.fillRect(0, 0, layer.width, layer.height);
                ctx.fillStyle = "white"; for (let i = 0; i < 20; i++) ctx.fillRect(100 + i * 200, 50 + Math.random() * 100, 100, 50);
            } else if (layer.type === 'mountains_far') {
                ctx.fillStyle = "#34495e"; ctx.fillRect(0, layer.height - 200, layer.width, 200); // simplified repetition
            } else if (layer.type === 'jungle_mid') {
                ctx.fillStyle = "#16a085"; ctx.fillRect(0, layer.height - 150, layer.width, 150); // simplified repetition
            }
            ctx.restore();
        });
    }

    function handleObstacles() {
        // Монеты
        for (let i = coins.length - 1; i >= 0; i--) {
            let coin = coins[i];
            coin.x -= coin.speed; coin.draw(coin.x, coin.y);
            
            // Сбор монеты
            if (player.x < coin.x + coin.width &&
                player.x + player.width > coin.x &&
                player.y < coin.y + coin.height &&
                player.y + player.height > coin.y) {
                coin.markedForDeletion = true;
                coinsCount++;
                score += 10;
                document.getElementById('coins-count').innerText = coinsCount;
                document.getElementById('score').innerText = score;
                // Частицы от сбора монет
                player.particles.push({x: coin.x + coin.width / 2, y: coin.y + coin.height / 2, dx: Math.random() * 4 - 2, dy: -Math.random() * 4, size: 8, color: '#f1c40f', markedForDeletion: false});
                // soundPlay('score'); // Place sound here
            }
            
            if (coin.x + coin.width < 0) coin.markedForDeletion = true;
        }
        while(coins.length > 0 && coins[0].markedForDeletion){ coins.shift(); }

        // Враги
        for (let i = obstacles.length - 1; i >= 0; i--) {
            let obs = obstacles[i];
            obs.x -= obs.speed;
            if (obs.type === 'bug') { obs.y += Math.sin(obs.angle) * 4; obs.angle += 0.1; }
            obs.draw(obs.x, obs.y);

            // Столкновение
            if (player.x < obs.x + obs.width &&
                player.x + player.width > obs.x &&
                player.y < obs.y + obs.height &&
                player.y + player.height > obs.y) {
                endGame();
            }

            if (obs.x + obs.width < 0) { obs.markedForDeletion = true; score++; document.getElementById('score').innerText = score; }
        }
        while(obstacles.length > 0 && obstacles[0].markedForDeletion){ obstacles.shift(); }
    }

    // Управление
    function handleInput() {
        if (gameState === 'playing') { player.jump(); }
        else if (gameState === 'gameover') { resetGame(); }
        else if (gameState === 'menu') { //startGame(); // Avoid immediate jump
        }
    }

    window.addEventListener("keydown", (e) => { if (e.code === "Space" || e.code === "ArrowUp") handleInput(); });
    window.addEventListener("mousedown", handleInput);
    window.addEventListener("touchstart", (e) => { e.preventDefault(); handleInput(); });

    // Установка скина
    function setSkin(skin) {
        currentSkin = skin;
        document.querySelectorAll('.skin-btn').forEach(btn => btn.classList.remove('selected'));
        document.getElementById(`skin-${skin}`).classList.add('selected');
    }

    // Игровой цикл
    function animate() {
        if (gameState !== 'playing') return;

        ctx.clearRect(0, 0, width, height);
        drawBackground();

        // Земля
        ctx.fillStyle = "#8B4513"; ctx.fillRect(0, groundY, width, groundHeight); // Почва
        ctx.fillStyle = "#228B22"; ctx.fillRect(0, groundY, width, 12); // Трава сверху

        handleObstacles();
        player.update();
        player.draw();

        // Спавн врагов и монет
        if (frames % Math.floor(80 - gameSpeed * 4) === 0) { spawnObstacle(); }
        if (frames % 200 === 0) { spawnCoin(); }

        // Ускорение игры
        if (frames % 500 === 0 && gameSpeed < 18) { gameSpeed += 1.0; }

        frames++;
        requestAnimationFrame(animate);
    }

    // Состояния игры
    function startGame() {
        if (gameState === 'playing') return;
        menu.style.display = 'none';
        hud.style.display = 'flex';
        gameState = 'playing';
        resetGame();
    }

    function resetGame() {
        score = 0;
        coinsCount = 0;
        frames = 0;
        gameSpeed = 7;
        player.y = groundY - player.height;
        player.dy = 0;
        player.currentAnimation = 'run';
        obstacles.length = 0;
        coins.length = 0;
        player.particles = [];
        
        document.getElementById('score').innerText = score;
        document.getElementById('coins-count').innerText = coinsCount;
        highScore = localStorage.getItem('arinaHighScore12') || 0;
        document.getElementById('high-score').innerText = highScore;

        hud.style.display = 'flex';
        gameOverScreen.style.display = 'none';
        
        gameState = 'playing';
        animate();
    }

    function endGame() {
        if (gameState === 'gameover') return;
        gameState = 'gameover';
        // soundPlay('die'); // Place sound here
        
        if (score > highScore) { highScore = score; localStorage.setItem('arinaHighScore12', highScore); }
        
        hud.style.display = 'none';
        gameOverScreen.style.display = 'block';
        document.getElementById('final-score').innerText = score;
    }

    function showMenu() { gameState = 'menu'; gameOverScreen.style.display = 'none'; hud.style.display = 'none'; menu.style.display = 'block'; }

    // Инициализация
    function init() {
        player.init();
        setTimeout(() => { loadingScreen.style.display = 'none'; showMenu(); }, 1500);
    }

    init();

</script>
</body>
