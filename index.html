<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>АРИНА ВО ВЬЕТНАМЕ: 10/10 REALITY EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin: 0; overflow: hidden; background: #111; font-family: 'Press Start 2P', cursive; color: #fff; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle, #2b1055, #000); }
        canvas { border: 4px solid #00ffcc; border-radius: 10px; box-shadow: 0 0 40px #00ffcc; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.85); z-index: 10; }
        .hidden { display: none !important; }
        h1 { color: #ff0055; text-shadow: 3px 3px 0 #fff; text-align: center; line-height: 1.5; }
        .btn { background: #00ffcc; color: #000; border: none; padding: 20px 40px; font-family: inherit; font-size: 20px; cursor: pointer; text-transform: uppercase; box-shadow: 5px 5px 0 #fff; margin-top: 20px; transition: 0.2s; }
        .btn:hover { transform: translate(-2px, -2px); box-shadow: 7px 7px 0 #fff; }
        .btn:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0 #fff; }
        #hud { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); font-size: 24px; text-shadow: 2px 2px 0 #000; z-index: 5; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="hud" class="hidden">СЧЕТ: <span id="score" style="color:#00ffcc">0</span></div>
        <canvas id="gameCanvas" width="1000" height="500"></canvas>
        
        <div id="menu" class="overlay">
            <h1>АРИНА ВО ВЬЕТНАМЕ<br><span style="color:#00ffcc; font-size: 20px;">ПЕРВЫЙ УРОВЕНЬ: ДАНАНГ</span></h1>
            <p style="color: #aaa; margin-top: 20px; text-align: center; line-height: 1.8;">
                ПРОБЕЛ или КЛИК — Прыжок<br>Опасайся крыс и летучих тараканов!
            </p>
            <button class="btn" onclick="startGame()">ИГРАТЬ</button>
        </div>

        <div id="gameover" class="overlay hidden">
            <h1>ИГРА ОКОНЧЕНА</h1>
            <h2>СЧЕТ: <span id="final-score" style="color: #00ffcc;">0</span></h2>
            <button class="btn" onclick="startGame()">РЕТРАЙ</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // ==========================================
    // ВСТАВЬ СЮДА ССЫЛКИ НА ФОТО АРИНЫ (БЕЗ ФОНА)
    // ==========================================
    const arinaImage = new Image();
    // Замени ссылку ниже на свою (подсказка как это сделать ниже)
    arinaImage.src = 'https://i.ibb.co/L5T1bF6/arina-blue.png'; 

    let frames = 0, score = 0, gameSpeed = 8, isPlaying = false;
    let entities = [], particles = [];
    const groundY = 400;

    const player = {
        x: 100, y: groundY, w: 70, h: 120, // Размеры Арины
        dy: 0, gravity: 0.9, jumpPower: -16, grounded: true,
        
        draw() {
            // Рисуем реальную картинку Арины
            if (arinaImage.complete) {
                ctx.drawImage(arinaImage, this.x, this.y - this.h, this.w, this.h);
            } else {
                // Заглушка, пока картинка грузится
                ctx.fillStyle = '#ff0055';
                ctx.fillRect(this.x, this.y - this.h, this.w, this.h);
            }
        },
        
        update() {
            this.dy += this.gravity;
            this.y += this.dy;
            if (this.y >= groundY) {
                this.y = groundY; this.dy = 0; this.grounded = true;
            }
        },
        
        jump() {
            if (this.grounded) {
                this.dy = this.jumpPower;
                this.grounded = false;
            }
        }
    };

    class Enemy {
        constructor(type) {
            this.type = type;
            this.x = canvas.width;
            this.markedForDeletion = false;
            
            if (type === 'rat') {
                this.w = 60; this.h = 35; this.y = groundY; this.speed = gameSpeed + 1; this.color = "#333";
            } else if (type === 'roach') {
                this.w = 40; this.h = 20; this.y = groundY - 60 - Math.random() * 50; this.speed = gameSpeed + 3; this.color = "#634832";
            } else if (type === 'gecko') {
                this.w = 100; this.h = 40; this.y = groundY; this.speed = gameSpeed + 4; this.color = "#2ecc71"; // Босс Геккон Токи
            }
        }
        
        update() {
            this.x -= this.speed;
            if (this.type === 'roach') this.y += Math.sin(frames * 0.1) * 3;
            if (this.x + this.w < -50) this.markedForDeletion = true;
            
            // Столкновение
            if (player.x + 10 < this.x + this.w && player.x + player.w - 10 > this.x &&
                player.y - player.h + 10 < this.y && player.y > this.y - this.h) {
                gameOver();
            }
        }
        
        draw() {
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y - this.h, this.w, this.h);
            
            // Глаза врагам
            ctx.fillStyle = "red";
            if (this.type === 'gecko') {
                ctx.fillStyle = "#f1c40f"; // Желтые глаза у геккона
                ctx.fillRect(this.x + 10, this.y - this.h + 10, 10, 10);
            } else {
                ctx.fillRect(this.x + 10, this.y - this.h + 5, 5, 5);
            }
        }
    }

    function drawBackground() {
        // Небо
        ctx.fillStyle = "#2c3e50";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Луна
        ctx.fillStyle = "#ecf0f1";
        ctx.beginPath(); ctx.arc(800, 100, 50, 0, Math.PI*2); ctx.fill();

        // Земля
        ctx.fillStyle = "#16a085"; 
        ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
        ctx.fillStyle = "#00ffcc";
        ctx.fillRect(0, groundY, canvas.width, 4);
    }

    function startGame() {
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('gameover').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        
        entities = [];
        score = 0; frames = 0; gameSpeed = 8;
        player.y = groundY; player.dy = 0;
        isPlaying = true;
        
        if (!window.loopRunning) loop(); 
    }

    function gameOver() {
        isPlaying = false;
        document.getElementById('hud').classList.add('hidden');
        document.getElementById('gameover').classList.remove('hidden');
        document.getElementById('final-score').innerText = score;
    }

    window.addEventListener('keydown', (e) => { if(e.code === 'Space') { e.preventDefault(); if(isPlaying) player.jump(); }});
    window.addEventListener('mousedown', () => { if(isPlaying) player.jump(); });

    function loop() {
        window.loopRunning = true;
        if (!isPlaying) return requestAnimationFrame(loop);

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        frames++; score++;
        
        if (frames % 5 === 0) document.getElementById('score').innerText = score;
        
        // Спавн врагов
        if (frames % Math.max(60, 120 - Math.floor(gameSpeed*2)) === 0) {
            let r = Math.random();
            if (r < 0.5) entities.push(new Enemy('rat'));
            else if (r < 0.9) entities.push(new Enemy('roach'));
            else entities.push(new Enemy('gecko')); // Редкий босс
        }
        
        if (frames % 500 === 0) gameSpeed += 0.5;

        drawBackground();

        for (let i = entities.length - 1; i >= 0; i--) {
            entities[i].update(); entities[i].draw();
            if (entities[i].markedForDeletion) entities.splice(i, 1);
        }

        player.update();
        player.draw();

        requestAnimationFrame(loop);
    }

    drawBackground();
</script>
</body>
</html>
