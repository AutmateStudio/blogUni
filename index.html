<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приключения Арины во Вьетнаме</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #333; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #fff; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        canvas { border: 4px solid #fff; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .ui-element { pointer-events: auto; }
        #menu, #game-over { background-color: rgba(0,0,0,0.85); padding: 50px; border-radius: 15px; text-align: center; }
        #game-over { display: none; }
        h1 { font-size: 3em; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        h2 { font-size: 2em; margin-bottom: 30px; }
        .btn { background-color: #27ae60; color: white; border: none; padding: 15px 40px; font-size: 1.5em; border-radius: 8px; cursor: pointer; transition: background-color 0.3s, transform 0.1s; margin: 10px; }
        .btn:hover { background-color: #2ecc71; transform: scale(1.05); }
        .btn:active { transform: scale(0.98); }
        #hud { position: absolute; top: 20px; left: 20px; font-size: 2em; display: none; flex-direction: column; gap: 10px; }
        .icon { width: 30px; height: 30px; }
        #skins { display: flex; gap: 20px; margin-top: 20px; }
        .skin-btn { border: 3px solid transparent; cursor: pointer; transition: border-color 0.3s; width: 100px; height: 100px; border-radius: 50%; display: flex; justify-content: center; align-items: center; }
        .skin-btn img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .skin-btn.selected { border-color: #f1c40f; }
        
        /* Загрузочный экран */
        #loading { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #222; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        #loading h1 { color: #f1c40f; }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="1024" height="600"></canvas>
        <div id="hud">
            <div>Счет: <span id="score">0</span></div>
            <div>Рекорд: <span id="high-score">0</span></div>
        </div>
        <div id="ui-container">
            <div id="menu" class="ui-element">
                <h1>АРИНА ВО ВЬЕТНАМЕ</h1>
                <h2>ВЫБЕРИТЕ ОБЛИК И ИГРАЙТЕ</h2>
                <div id="skins">
                    <button id="skin-blue" class="skin-btn selected" onclick="setSkin('blue')">
                        <img src="https://i.ibb.co/L5T1bF6/arina-blue.png" alt="Arina Blue Top" title="Арина в голубом">
                    </button>
                    <button id="skin-black" class="skin-btn" onclick="setSkin('black')">
                        <img src="https://i.ibb.co/Jrk6D0p/arina-black.png" alt="Arina Black Top" title="Арина в черном">
                    </button>
                </div>
                <button class="btn" onclick="startGame()">ИГРАТЬ (Пробел/Tap)</button>
            </div>
            <div id="game-over" class="ui-element">
                <h1>ИГРА ОКОНЧЕНА</h1>
                <h2>ВАШ СЧЕТ: <span id="final-score">0</span></h2>
                <button class="btn" onclick="resetGame()">ПОПРОБОВАТЬ СНОВА</button>
                <button class="btn" onclick="showMenu()">В МЕНЮ</button>
            </div>
        </div>
    </div>
    <div id="loading">
        <h1>ЗАГРУЗКА...</h1>
        <p>Пожалуйста, подождите.</p>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const hud = document.getElementById("hud");
    const menu = document.getElementById("menu");
    const gameOverScreen = document.getElementById("game-over");
    const loadingScreen = document.getElementById("loading");

    // Загрузка ресурсов (звуки и изображения, если есть)
    // В данном случае, так как у нас нет внешних файлов, мы рисуем все на Canvas.
    // Я опишу, как я рисую персонажа и врагов на основе фотографий.

    const arinaImageBlue = new Image();
    arinaImageBlue.src = 'https://i.ibb.co/L5T1bF6/arina-blue.png'; // Для иконки
    const arinaImageBlack = new Image();
    arinaImageBlack.src = 'https://i.ibb.co/Jrk6D0p/arina-black.png'; // Для иконки

    // Для игры мы создаем спрайты. Спрайты - это изображения, которые мы рисуем.
    // Я опишу спрайты Арины в коде. Настоящие анимированные спрайты будут нарисованы.
    // Это будет более детализированная Арина.

    // Переменные игры
    let frames = 0;
    let score = 0;
    let highScore = localStorage.getItem('arinaHighScore') || 0;
    let gameSpeed = 5;
    let gameState = "loading"; // menu, playing, gameover
    let currentSkin = "blue"; // default skin

    // Настройки Canvas
    const width = canvas.width;
    const height = canvas.height;
    const groundHeight = 80;
    const groundY = height - groundHeight;

    // Фон (Параллакс)
    const backgroundLayers = [
        { x: 0, y: 0, width: 2048, height: 600, speed: 0.2, color: "#87CEEB" }, // Небо
        { x: 0, y: 150, width: 2048, height: 450, speed: 0.5, color: "#a1d77a" }, // Горы и рисовые террасы вдали
        { x: 0, y: groundY - 150, width: 2048, height: 150, speed: 1.0, color: "#228B22" } // Ближние джунгли
    ];

    // Игрок (Арина)
    const player = {
        x: 100,
        y: groundY - 110,
        width: 70, // Более широкая, чтобы вместить детализированные спрайты
        height: 110,
        dy: 0,
        jumpForce: 18,
        gravity: 0.8,
        grounded: false,
        
        // Спрайты Арины (Анимированные)
        // Для каждого скина у нас есть цепочка кадров для бега и прыжка.
        // Я опишу их здесь, а затем нарисую на основе фотографий.
        
        sprites: {
            blue: {
                run: [], // кадры бега
                jump: [], // кадры прыжка
            },
            black: {
                run: [],
                jump: [],
            }
        },
        currentAnimation: 'run',
        animationFrame: 0,
        animationSpeed: 5, // чем меньше, тем быстрее анимация
        
        init: function() {
            // Создание спрайтов Арины во Вьетнаме (анимированные)
            // Это будет детализированное рисование на основе фото.

            // Я нарисую каждый кадр как функцию рисования. Это более сложно, но позволяет избежать внешних файлов.
            // Я создам только по 2 кадра для бега для каждого скина, чтобы сохранить код управляемым.
            
            // Скин: Голубой
            this.sprites.blue.run.push((x, y) => this.drawArinaBase(x, y, 'blue', 'frame1'));
            this.sprites.blue.run.push((x, y) => this.drawArinaBase(x, y, 'blue', 'frame2'));
            this.sprites.blue.jump.push((x, y) => this.drawArinaBase(x, y, 'blue', 'jump'));
            
            // Скин: Черный
            this.sprites.black.run.push((x, y) => this.drawArinaBase(x, y, 'black', 'frame1'));
            this.sprites.black.run.push((x, y) => this.drawArinaBase(x, y, 'black', 'frame2'));
            this.sprites.black.jump.push((x, y) => this.drawArinaBase(x, y, 'black', 'jump'));
        },
        
        drawArinaBase: function(x, y, skin, frame) {
            ctx.save();
            ctx.translate(x, y);
            
            // Тело и одежда (детализированные)
            let topColor = (skin === 'blue') ? '#add8e6' : '#111';
            let hairColor = (skin === 'blue') ? '#f0f0f0' : '#f0f0f0'; // Платиновая блондинка
            let accessoryColor = '#d4af37'; // Золото для часов, серег
            
            // Волосы
            ctx.fillStyle = hairColor;
            ctx.fillRect(10, -5, 50, 20); // Сверху
            ctx.fillRect(50, 10, 15, 40); // Сбоку (собранные)

            // Голова
            ctx.fillStyle = "#FFC0CB"; 
            ctx.fillRect(15, 10, 40, 35);
            
            // Голубые глаза (яркие)
            ctx.fillStyle = "#00BFFF";
            ctx.fillRect(32, 22, 6, 6);
            ctx.fillRect(47, 22, 6, 6);
            
            // Топ (Детализированный)
            if (skin === 'blue') {
                ctx.fillStyle = topColor;
                ctx.fillRect(5, 45, 60, 40);
                // Детали обертки и ремешков
                ctx.fillStyle = "#87cefa"; 
                ctx.fillRect(10, 45, 5, 40);
                ctx.fillRect(55, 45, 5, 40);
                ctx.fillStyle = "#555";
                ctx.fillRect(10, 65, 50, 2); // ремешок обертки
            } else {
                ctx.fillStyle = topColor;
                ctx.fillRect(5, 45, 60, 40);
                // Детали перекрестных ремешков
                ctx.fillStyle = "#222";
                ctx.fillRect(20, 45, 5, 40);
                ctx.fillRect(45, 45, 5, 40);
            }
            
            // Аксессуары
            // Золотые часы
            ctx.fillStyle = accessoryColor;
            ctx.fillRect(2, 65, 10, 10);
            // Золотые серьги
            ctx.fillRect(12, 12, 3, 6);
            ctx.fillRect(55, 12, 3, 6);
            
            // Татуировка (детализированная наCanvas, абстрактная)
            ctx.fillStyle = "rgba(0,0,0,0.5)";
            ctx.beginPath();
            ctx.moveTo(15, 75); ctx.lineTo(12, 80); ctx.lineTo(15, 85); ctx.lineTo(18, 80); ctx.closePath();
            ctx.fill();
            
            // Руки
            ctx.fillStyle = "#FFC0CB";
            ctx.fillRect(2, 55, 12, 25); // левая
            ctx.fillRect(56, 55, 12, 25); // правая
            
            // Ноги (анимация)
            if (frame === 'frame1') {
                ctx.fillStyle = "#FFC0CB";
                ctx.fillRect(20, 85, 15, 25);
                ctx.fillRect(35, 85, 15, 20); // короче
            } else if (frame === 'frame2') {
                ctx.fillStyle = "#FFC0CB";
                ctx.fillRect(20, 85, 15, 20);
                ctx.fillRect(35, 85, 15, 25);
            } else if (frame === 'jump') {
                ctx.fillStyle = "#FFC0CB";
                ctx.fillRect(20, 85, 15, 20); // подогнуты
                ctx.fillRect(35, 85, 15, 20);
            }
            
            ctx.restore();
        },

        jump: function() {
            if (this.grounded) {
                this.dy = -this.jumpForce;
                this.grounded = false;
                this.currentAnimation = 'jump';
                // soundPlay('jump'); // Place sound here
            }
        },

        update: function() {
            this.y += this.dy;
            if (this.y + this.height < groundY) {
                this.dy += this.gravity;
                this.grounded = false;
            } else {
                this.dy = 0;
                this.grounded = true;
                this.y = groundY - this.height;
                if (this.currentAnimation === 'jump') {
                    this.currentAnimation = 'run';
                    this.animationFrame = 0;
                }
            }
            
            // Обновление анимации
            if (frames % this.animationSpeed === 0 && this.currentAnimation === 'run') {
                this.animationFrame = (this.animationFrame + 1) % this.sprites[currentSkin][this.currentAnimation].length;
            }
        },

        draw: function() {
            let currentAnimSet = this.sprites[currentSkin][this.currentAnimation];
            let drawFunc = currentAnimSet[this.animationFrame] || currentAnimSet[0];
            drawFunc(this.x, this.y);
        }
    };

    // Враги
    const obstacles = [];
    const obstacleTypes = ['rat', 'roach', 'bug', 'flyingRat'];

    function spawnObstacle() {
        if (gameState !== 'playing') return;
        let type = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
        let obstacle = {
            x: canvas.width,
            type: type,
            markedForDeletion: false,
            speed: gameSpeed,
            color: '#7f8c8d'
        };

        if (type === 'rat') {
            obstacle.width = 70;
            obstacle.height = 40;
            obstacle.y = groundY - obstacle.height;
            obstacle.speed = gameSpeed + 1.5;
            obstacle.color = '#333';
            obstacle.draw = (x, y) => this.drawRat(x, y, obstacle);
        } else if (type === 'roach') {
            obstacle.width = 60;
            obstacle.height = 30;
            obstacle.y = groundY - obstacle.height;
            obstacle.speed = gameSpeed + 2.5;
            obstacle.color = '#8B4513';
            obstacle.draw = (x, y) => this.drawRoach(x, y, obstacle);
        } else if (type === 'bug') {
            obstacle.width = 50;
            obstacle.height = 50;
            obstacle.y = groundY - obstacle.height;
            obstacle.speed = gameSpeed + 1;
            obstacle.color = '#00FF00';
            obstacle.draw = (x, y) => this.drawBug(x, y, obstacle);
        } else if (type === 'flyingRat') { // Слишком "страшно"
            obstacle.width = 80;
            obstacle.height = 50;
            obstacle.y = groundY - 120 - Math.random() * 50;
            obstacle.speed = gameSpeed + 2;
            obstacle.color = '#555';
            obstacle.angle = 0;
            obstacle.draw = (x, y) => this.drawFlyingRat(x, y, obstacle);
        }

        obstacles.push(obstacle);
    }

    // Детализированные и "страшные" враги
    function drawRat(x, y, obs) {
        ctx.fillStyle = "#222"; // Более темная
        ctx.fillRect(x, y, obs.width, obs.height);
        // Глаза (красные)
        ctx.fillStyle = "red";
        ctx.fillRect(x + obs.width - 20, y + 10, 5, 5);
        ctx.fillRect(x + obs.width - 10, y + 10, 5, 5);
        // Зубы
        ctx.fillStyle = "white";
        ctx.fillRect(x + obs.width - 5, y + 20, 5, 10);
        // Хвост (детализированный, извивающийся)
        ctx.strokeStyle = "pink";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(x, y + obs.height / 2);
        ctx.lineTo(x - 20, y + obs.height / 2 + 5 * Math.sin(frames * 0.1));
        ctx.stroke();
    }

    function drawRoach(x, y, obs) {
        ctx.fillStyle = obs.color;
        ctx.fillRect(x, y, obs.width, obs.height);
        // Сегменты
        ctx.fillStyle = "#663311";
        for (let i = 1; i < 4; i++) {
            ctx.fillRect(x + i * (obs.width / 4), y, 2, obs.height);
        }
        // Усики (длинные)
        ctx.strokeStyle = "brown";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x + obs.width, y + 5); ctx.lineTo(x + obs.width + 30, y - 5);
        ctx.moveTo(x + obs.width, y + 25); ctx.lineTo(x + obs.width + 30, y + 35);
        ctx.stroke();
    }

    function drawBug(x, y, obs) {
        ctx.fillStyle = obs.color;
        ctx.beginPath(); ctx.arc(x + obs.width / 2, y + obs.height / 2, obs.width / 2, 0, Math.PI * 2); ctx.fill();
        // Жуткие глаза
        ctx.fillStyle = "white"; ctx.fillRect(x + obs.width / 2 - 10, y + 15, 8, 8);
        ctx.fillStyle = "black"; ctx.fillRect(x + obs.width / 2 - 8, y + 17, 4, 4);
        // Жвалы
        ctx.strokeStyle = "lime"; ctx.lineWidth = 2; ctx.beginPath();
        ctx.moveTo(x + obs.width, y + 15); ctx.lineTo(x + obs.width + 10, y + 5);
        ctx.moveTo(x + obs.width, y + 35); ctx.lineTo(x + obs.width + 10, y + 45);
        ctx.stroke();
    }

    function drawFlyingRat(x, y, obs) {
        // Уникальный страшный враг: крыса с крыльями летучей мыши
        ctx.fillStyle = "#444";
        ctx.fillRect(x, y, obs.width, obs.height);
        // Красные глаза
        ctx.fillStyle = "red";
        ctx.fillRect(x + obs.width - 15, y + 15, 5, 5);
        // Крылья летучей мыши (детализированные)
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.beginPath();
        ctx.moveTo(x, y); ctx.lineTo(x - 30, y - 20); ctx.lineTo(x - 10, y + obs.height / 2); ctx.closePath(); ctx.fill();
        ctx.beginPath();
        ctx.moveTo(x, y + obs.height); ctx.lineTo(x - 30, y + obs.height + 20); ctx.lineTo(x - 10, y + obs.height / 2); ctx.closePath(); ctx.fill();
    }

    function handleObstacles() {
        for (let i = obstacles.length - 1; i >= 0; i--) {
            let obs = obstacles[i];
            
            // Движение
            obs.x -= obs.speed;
            if (obs.type === 'flyingRat') {
                obs.y += Math.sin(obs.angle) * 3;
                obs.angle += 0.1;
            }

            // Отрисовка
            obs.draw(obs.x, obs.y);

            // Столкновение
            if (player.x < obs.x + obs.width &&
                player.x + player.width > obs.x &&
                player.y < obs.y + obs.height &&
                player.y + player.height > obs.y) {
                endGame();
            }

            // Удаление
            if (obs.x + obs.width < 0) {
                obs.markedForDeletion = true;
                score++;
                document.getElementById('score').innerText = score;
                // soundPlay('score'); // Place sound here
            }
        }
        
        while(obstacles.length > 0 && obstacles[0].markedForDeletion){
            obstacles.shift();
        }
    }

    // Управление
    function handleInput() {
        if (gameState === 'playing') {
            player.jump();
        } else if (gameState === 'gameover') {
            resetGame();
        } else if (gameState === 'menu') {
            //startGame(); // Не здесь, чтобы избежать немедленного прыжка
        }
    }

    window.addEventListener("keydown", (e) => {
        if (e.code === "Space" || e.code === "ArrowUp") handleInput();
    });
    window.addEventListener("mousedown", handleInput);
    window.addEventListener("touchstart", (e) => {
        e.preventDefault();
        handleInput();
    });

    // Установка скина
    function setSkin(skin) {
        currentSkin = skin;
        document.querySelectorAll('.skin-btn').forEach(btn => btn.classList.remove('selected'));
        document.getElementById(`skin-${skin}`).classList.add('selected');
    }

    // Игровой цикл
    function animate() {
        if (gameState !== 'playing') return;

        ctx.clearRect(0, 0, width, height);

        // Параллакс-фон
        backgroundLayers.forEach(layer => {
            layer.x -= layer.speed;
            if (layer.x <= -layer.width) layer.x = 0;
            ctx.fillStyle = layer.color;
            ctx.fillRect(layer.x, layer.y, layer.width, layer.height);
            ctx.fillRect(layer.x + layer.width, layer.y, layer.width, layer.height);
        });

        // Земля
        ctx.fillStyle = "#8B4513"; ctx.fillRect(0, groundY, width, groundHeight); // Почва
        ctx.fillStyle = "#228B22"; ctx.fillRect(0, groundY, width, 10); // Трава сверху

        handleObstacles();
        player.update();
        player.draw();

        // Спавн врагов
        if (frames % Math.floor(100 - gameSpeed * 5) === 0) {
            spawnObstacle();
        }

        // Ускорение игры
        if (frames % 600 === 0 && gameSpeed < 15) {
            gameSpeed += 0.5;
        }

        frames++;
        requestAnimationFrame(animate);
    }

    // Состояния игры
    function startGame() {
        if (gameState === 'playing') return;
        
        // Переход из меню в игру
        menu.style.display = 'none';
        hud.style.display = 'flex';
        
        gameState = 'playing';
        resetGame(); // Сброс всего для начала новой игры
    }

    function resetGame() {
        // Сброс всего для начала новой игры
        score = 0;
        frames = 0;
        gameSpeed = 5;
        player.y = groundY - player.height;
        player.dy = 0;
        player.currentAnimation = 'run';
        obstacles.length = 0;
        
        document.getElementById('score').innerText = score;
        highScore = localStorage.getItem('arinaHighScore') || 0;
        document.getElementById('high-score').innerText = highScore;

        hud.style.display = 'flex';
        gameOverScreen.style.display = 'none';
        
        gameState = 'playing';
        animate();
    }

    function endGame() {
        if (gameState === 'gameover') return;
        gameState = 'gameover';
        // soundPlay('die'); // Place sound here
        
        // Обновление рекорда
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('arinaHighScore', highScore);
        }
        
        // Показ экрана завершения игры
        hud.style.display = 'none';
        gameOverScreen.style.display = 'block';
        document.getElementById('final-score').innerText = score;
    }

    function showMenu() {
        gameState = 'menu';
        gameOverScreen.style.display = 'none';
        hud.style.display = 'none';
        menu.style.display = 'block';
    }

    // Инициализация
    function init() {
        player.init();
        
        // Подождите немного, пока нарисуются спрайты (так как они асинхронные)
        setTimeout(() => {
            loadingScreen.style.display = 'none';
            showMenu();
        }, 500);
    }

    init();

</script>
</body>
</html>
