<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приключения Арины во Вьетнаме</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #87CEEB; /* Тропическое небо */
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        h1 {
            color: #333;
            margin-top: 20px;
        }
        canvas {
            background-color: #e0f7fa;
            border: 4px solid #4CAF50;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        #instructions {
            margin-top: 10px;
            font-size: 18px;
            color: #555;
        }
    </style>
</head>
<body>

    <h1>Приключения Арины во Вьетнаме 🌴</h1>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <div id="instructions">Жми <b>ПРОБЕЛ</b> или кликай по экрану, чтобы прыгать!</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // Переменные игры
    let frames = 0;
    let score = 0;
    let gameSpeed = 5;
    let gameOver = false;

    // Земля
    const groundHeight = 50;
    const groundY = canvas.height - groundHeight;

    // Арина (Игрок)
    const arina = {
        x: 100,
        y: groundY - 60,
        width: 40,
        height: 60,
        dy: 0,
        jumpForce: 14,
        gravity: 0.6,
        grounded: false,

        jump() {
            if (this.grounded) {
                this.dy = -this.jumpForce;
                this.grounded = false;
            }
        },

        update() {
            this.y += this.dy;
            if (this.y + this.height < groundY) {
                this.dy += this.gravity;
                this.grounded = false;
            } else {
                this.dy = 0;
                this.grounded = true;
                this.y = groundY - this.height;
            }
        },

        draw() {
            // Тело (платье)
            ctx.fillStyle = "#FF69B4"; 
            ctx.fillRect(this.x, this.y + 20, this.width, this.height - 20);
            
            // Голова
            ctx.fillStyle = "#FFC0CB"; 
            ctx.fillRect(this.x + 5, this.y, 30, 25);
            
            // Белые волосы
            ctx.fillStyle = "#FFFFFF"; 
            ctx.fillRect(this.x, this.y - 5, 40, 15);
            ctx.fillRect(this.x, this.y, 10, 30); // прядь

            // Голубые глаза
            ctx.fillStyle = "#00BFFF"; 
            ctx.fillRect(this.x + 18, this.y + 8, 5, 5);
            ctx.fillRect(this.x + 28, this.y + 8, 5, 5);
        }
    };

    // Враги
    const obstacles = [];
    const obstacleTypes = ['rat', 'roach', 'bug'];

    function spawnObstacle() {
        let type = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
        let obstacle = {
            x: canvas.width,
            type: type,
            markedForDeletion: false
        };

        if (type === 'rat') {
            obstacle.width = 50;
            obstacle.height = 25;
            obstacle.y = groundY - obstacle.height;
            obstacle.speed = gameSpeed + 1;
            obstacle.color = '#7f8c8d'; // Серая крыса
        } else if (type === 'roach') {
            obstacle.width = 40;
            obstacle.height = 15;
            obstacle.y = groundY - obstacle.height;
            obstacle.speed = gameSpeed + 2; // Тараканы быстрые
            obstacle.color = '#8B4513'; // Коричневый таракан
        } else if (type === 'bug') {
            obstacle.width = 30;
            obstacle.height = 30;
            obstacle.y = groundY - 80 - Math.random() * 50; // Летают высоко
            obstacle.speed = gameSpeed + 1.5;
            obstacle.color = '#27ae60'; // Зеленый жук
            obstacle.angle = 0; // Для волнообразного движения
        }

        obstacles.push(obstacle);
    }

    function handleObstacles() {
        if (frames % 100 === 0) {
            spawnObstacle();
        }

        for (let i = 0; i < obstacles.length; i++) {
            let obs = obstacles[i];
            
            // Движение
            obs.x -= obs.speed;
            if (obs.type === 'bug') {
                obs.y += Math.sin(obs.angle) * 2;
                obs.angle += 0.1;
            }

            // Отрисовка
            ctx.fillStyle = obs.color;
            if (obs.type === 'bug') {
                ctx.beginPath();
                ctx.arc(obs.x + obs.width/2, obs.y + obs.height/2, obs.width/2, 0, Math.PI * 2);
                ctx.fill();
                // Крылышки
                ctx.fillStyle = "rgba(255,255,255,0.7)";
                ctx.fillRect(obs.x + 5, obs.y - 10, 10, 15);
            } else {
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                // Хвост крысе или усы таракану
                ctx.fillStyle = "#000";
                if (obs.type === 'rat') ctx.fillRect(obs.x + obs.width, obs.y + 10, 15, 3);
                if (obs.type === 'roach') {
                    ctx.fillRect(obs.x - 5, obs.y + 5, 5, 2);
                    ctx.fillRect(obs.x - 5, obs.y + 10, 5, 2);
                }
            }

            // Столкновение (Collision Detection)
            if (arina.x < obs.x + obs.width &&
                arina.x + arina.width > obs.x &&
                arina.y < obs.y + obs.height &&
                arina.y + arina.height > obs.y) {
                gameOver = true;
            }

            // Удаление ушедших за экран
            if (obs.x + obs.width < 0) {
                obs.markedForDeletion = true;
                score++;
            }
        }

        // Очистка массива от удаленных врагов
        while(obstacles.length > 0 && obstacles[0].markedForDeletion){
            obstacles.shift();
        }
    }

    // Управление
    window.addEventListener("keydown", (e) => {
        if (e.code === "Space" || e.code === "ArrowUp") {
            if (gameOver) resetGame();
            else arina.jump();
        }
    });
    window.addEventListener("mousedown", () => {
        if (gameOver) resetGame();
        else arina.jump();
    });

    function resetGame() {
        arina.y = groundY - arina.height;
        arina.dy = 0;
        obstacles.length = 0;
        score = 0;
        frames = 0;
        gameSpeed = 5;
        gameOver = false;
        animate();
    }

    // Главный игровой цикл
    function animate() {
        if (gameOver) {
            ctx.fillStyle = "rgba(0,0,0,0.5)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.font = "40px Arial";
            ctx.textAlign = "center";
            ctx.fillText("ИГРА ОКОНЧЕНА", canvas.width/2, canvas.height/2);
            ctx.font = "20px Arial";
            ctx.fillText("Счет: " + score, canvas.width/2, canvas.height/2 + 40);
            ctx.fillText("Нажми пробел для рестарта", canvas.width/2, canvas.height/2 + 80);
            return;
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Рисуем землю
        ctx.fillStyle = "#4CAF50"; // Тропическая трава
        ctx.fillRect(0, groundY, canvas.width, groundHeight);

        // Рисуем счет
        ctx.fillStyle = "#333";
        ctx.font = "24px Arial";
        ctx.textAlign = "left";
        ctx.fillText("Счет: " + score, 20, 30);

        arina.update();
        arina.draw();
        
        handleObstacles();

        // Ускорение игры со временем
        if (frames % 600 === 0 && gameSpeed < 12) {
            gameSpeed += 0.5;
        }

        frames++;
        requestAnimationFrame(animate);
    }

    // Запуск
    animate();

</script>
</body>
</html>
