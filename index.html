<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АРИНА ВО ВЬЕТНАМЕ: ULTRA EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin: 0; overflow: hidden; background: #111; font-family: 'Press Start 2P', cursive; color: #fff; user-select: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at center, #2b1055 0%, #7597de 100%); }
        canvas { border-radius: 10px; box-shadow: 0 0 40px rgba(0,255,200,0.3); background: linear-gradient(to bottom, #ff7e5f, #feb47b); }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 10; transition: opacity 0.3s; }
        .hidden { opacity: 0; pointer-events: none; display: none !important; }
        h1 { color: #ffe600; text-shadow: 4px 4px 0 #ff0055; font-size: 40px; text-align: center; line-height: 1.5; margin-bottom: 30px; }
        .btn { background: #ff0055; border: 4px solid #fff; color: white; padding: 20px 40px; font-family: inherit; font-size: 20px; cursor: pointer; text-transform: uppercase; transition: transform 0.1s, background 0.2s; box-shadow: 4px 4px 0 #fff; margin: 10px; }
        .btn:hover { background: #ff3377; transform: translate(-2px, -2px); box-shadow: 6px 6px 0 #fff; }
        .btn:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0 #fff; }
        #hud { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 40px; z-index: 5; font-size: 24px; text-shadow: 2px 2px 0 #000; }
        .hud-item span { color: #ffe600; }
        .skin-selector { display: flex; gap: 20px; margin-bottom: 30px; }
        .skin-btn { width: 80px; height: 80px; border-radius: 50%; border: 4px solid #555; background: #222; cursor: pointer; position: relative; overflow: hidden; transition: 0.3s; }
        .skin-btn.active { border-color: #ffe600; box-shadow: 0 0 20px #ffe600; transform: scale(1.1); }
        .skin-indicator { width: 100%; height: 100%; }
        #skin-blue .skin-indicator { background: linear-gradient(135deg, #a8caba 0%, #5d4157 100%); }
        #skin-black .skin-indicator { background: linear-gradient(135deg, #434343 0%, #000000 100%); }
        .hint { color: #aaa; font-size: 12px; margin-top: 20px; text-align: center; line-height: 1.8; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="hud" class="hidden">
            <div class="hud-item">СЧЕТ: <span id="score">0</span></div>
            <div class="hud-item">ФО-БО: <span id="pho">0</span></div>
        </div>
        <canvas id="gameCanvas" width="1000" height="500"></canvas>
        
        <div id="menu" class="overlay">
            <h1>АРИНА ВО ВЬЕТНАМЕ<br><span style="font-size: 20px; color: #fff;">ULTRA EDITION 12/10</span></h1>
            <div class="skin-selector">
                <button class="skin-btn active" id="skin-blue" onclick="selectSkin('blue')" title="Голубой топ"><div class="skin-indicator"></div></button>
                <button class="skin-btn" id="skin-black" onclick="selectSkin('black')" title="Черный топ"><div class="skin-indicator"></div></button>
            </div>
            <button class="btn" onclick="startGame()">ИГРАТЬ</button>
            <div class="hint">ПРОБЕЛ / КЛИК - Прыжок<br>ДВОЙНОЕ НАЖАТИЕ - Двойной прыжок!</div>
        </div>

        <div id="gameover" class="overlay hidden">
            <h1>УПС! ТЕБЯ СБИЛИ!</h1>
            <h2 style="color: white; margin-bottom: 30px; text-shadow: 2px 2px 0 #000;">ФИНАЛЬНЫЙ СЧЕТ: <span id="final-score" style="color: #ffe600;">0</span></h2>
            <button class="btn" onclick="startGame()">РЕСТАРТ</button>
            <button class="btn" style="background: #444;" onclick="document.getElementById('gameover').classList.add('hidden'); document.getElementById('menu').classList.remove('hidden');">В МЕНЮ</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    
    // Глобальные переменные
    let frames = 0, score = 0, phoCount = 0, gameSpeed = 7, isPlaying = false;
    let currentSkin = 'blue';
    let entities = [], particles = [], decorations = [];
    const groundY = 430;
    let cameraShake = 0;

    // --- ЗВУКОВОЙ ДВИЖОК (Web Audio API) ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function initAudio() {
        if (!audioCtx) audioCtx = new AudioContext();
    }

    function playSound(type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        if (type === 'jump') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'coin') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.05);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'hit') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.3);
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }
    }

    // --- ИГРОК (АРИНА) ---
    const player = {
        x: 100, y: groundY, w: 50, h: 90,
        dy: 0, gravity: 0.8, jumpPower: -13, jumps: 0, maxJumps: 2,
        
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            
            // Легкая анимация бега (наклон)
            if (this.y === groundY && frames % 20 < 10) ctx.rotate(0.05);
            else if (this.y === groundY) ctx.rotate(-0.05);
            
            // Кожа
            const skinColor = "#fcd5ce";
            
            // Задние волосы (хвост/пучок)
            ctx.fillStyle = "#f8e192"; // Блонд
            ctx.beginPath();
            ctx.arc(10, -85, 15, 0, Math.PI*2);
            if(this.y !== groundY) ctx.ellipse(5, -75, 10, 25, Math.PI/4, 0, Math.PI*2); // хвост развивается в прыжке
            else ctx.ellipse(5, -70, 10, 20, Math.PI/6, 0, Math.PI*2);
            ctx.fill();

            // Рука (задняя)
            ctx.fillStyle = skinColor;
            ctx.beginPath(); ctx.roundRect(30, -50, 10, 35, 5); ctx.fill();

            // Ноги (бег)
            ctx.fillStyle = "#222"; // джинсы/штаны
            let legOffset = (this.y === groundY) ? Math.sin(frames * 0.3) * 15 : 0;
            ctx.beginPath(); ctx.roundRect(10 + legOffset, -20, 12, 20, 3); ctx.fill(); // левая
            ctx.beginPath(); ctx.roundRect(28 - legOffset, -20, 12, 20, 3); ctx.fill(); // правая

            // Тело
            ctx.fillStyle = skinColor;
            ctx.beginPath(); ctx.roundRect(12, -60, 26, 45, 10); ctx.fill();

            // Одежда (Асимметричный топ)
            if (currentSkin === 'blue') {
                ctx.fillStyle = "#a8caba"; // Светло-голубой
                ctx.beginPath();
                ctx.moveTo(12, -50); ctx.lineTo(38, -60); // Диагональ
                ctx.lineTo(38, -25); ctx.lineTo(12, -25); ctx.fill();
                // Тонкая лямка
                ctx.strokeStyle = "#a8caba"; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(15, -50); ctx.lineTo(15, -65); ctx.stroke();
            } else {
                ctx.fillStyle = "#111"; // Черный топ
                ctx.beginPath();
                ctx.moveTo(12, -60); ctx.lineTo(38, -50); // Диагональ в другую сторону
                ctx.lineTo(38, -25); ctx.lineTo(12, -25); ctx.fill();
                // Перекрестные лямки
                ctx.strokeStyle = "#111"; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(15, -60); ctx.lineTo(30, -70); ctx.stroke();
            }

            // Тату на правой руке
            ctx.strokeStyle = "#888"; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(35, -40); ctx.lineTo(32, -35); ctx.lineTo(38, -32); ctx.stroke();

            // Голова
            ctx.fillStyle = skinColor;
            ctx.beginPath(); ctx.arc(25, -75, 18, 0, Math.PI*2); ctx.fill();
            
            // Передние волосы (челка)
            ctx.fillStyle = "#f8e192";
            ctx.beginPath();
            ctx.arc(25, -78, 19, Math.PI, Math.PI*2);
            ctx.moveTo(6, -78); ctx.quadraticCurveTo(15, -60, 18, -75); ctx.fill();

            // Лицо (глаза голубые)
            ctx.fillStyle = "#4a90e2"; // Синие/голубые глаза
            ctx.beginPath(); ctx.arc(30, -78, 3, 0, Math.PI*2); ctx.fill(); // правый
            ctx.beginPath(); ctx.arc(40, -78, 3, 0, Math.PI*2); ctx.fill(); // левый
            
            // Часы
            ctx.fillStyle = "#d4af37";
            ctx.fillRect(10, -35, 8, 4);

            // Рука (передняя)
            ctx.fillStyle = skinColor;
            ctx.beginPath(); ctx.roundRect(10, -55, 10, 30, 5); ctx.fill();

            ctx.restore();
        },
        
        update() {
            this.dy += this.gravity;
            this.y += this.dy;
            
            if (this.y >= groundY) {
                this.y = groundY;
                this.dy = 0;
                this.jumps = 0;
                // Пыль при беге
                if (frames % 5 === 0 && isPlaying) createParticle(this.x + 10, this.y, "#8b5a2b");
            }
        },
        
        jump() {
            initAudio();
            if (this.jumps < this.maxJumps) {
                this.dy = this.jumpPower;
                this.jumps++;
                playSound('jump');
                // Частицы прыжка
                for(let i=0; i<5; i++) createParticle(this.x + 25, this.y, "#fff");
            }
        }
    };

    // --- СИСТЕМА ЧАСТИЦ ---
    function createParticle(x, y, color) {
        particles.push({
            x, y, color,
            vx: (Math.random() - 0.5) * 4, vy: (Math.random() - 1) * 4,
            life: 1, size: Math.random() * 4 + 2
        });
    }

    // --- ВРАГИ И БОНУСЫ ---
    class Entity {
        constructor(type) {
            this.type = type;
            this.x = canvas.width;
            this.markedForDeletion = false;
            
            if (type === 'rat') {
                this.w = 60; this.h = 30; this.y = groundY; this.speed = gameSpeed + 1;
            } else if (type === 'moto_rat') {
                this.w = 80; this.h = 60; this.y = groundY; this.speed = gameSpeed + 4; // Очень быстрый
            } else if (type === 'roach') {
                this.w = 40; this.h = 30; this.y = groundY - 80 - Math.random() * 50; this.speed = gameSpeed + 2; this.angle = 0;
            } else if (type === 'pho') {
                this.w = 30; this.h = 30; this.y = groundY - 40 - Math.random() * 100; this.speed = gameSpeed;
            }
        }
        
        update() {
            this.x -= this.speed;
            if (this.type === 'roach') {
                this.y += Math.sin(this.angle) * 3;
                this.angle += 0.1;
            }
            if (this.x + this.w < 0) this.markedForDeletion = true;
            
            // Проверка столкновений
            if (player.x < this.x + this.w && player.x + player.w > this.x &&
                player.y - player.h < this.y && player.y > this.y - this.h) {
                
                if (this.type === 'pho') {
                    phoCount++; score += 50;
                    document.getElementById('pho').innerText = phoCount;
                    playSound('coin');
                    for(let i=0; i<10; i++) createParticle(this.x, this.y, "#0f0");
                    this.markedForDeletion = true;
                } else {
                    gameOver();
                }
            }
        }
        
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            
            if (this.type === 'rat') {
                ctx.fillStyle = "#333";
                ctx.beginPath(); ctx.ellipse(30, -15, 30, 15, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "red"; ctx.fillRect(10, -20, 4, 4); // глаз
                ctx.strokeStyle = "pink"; ctx.lineWidth = 3; // хвост
                ctx.beginPath(); ctx.moveTo(60, -15); ctx.lineTo(80, -15 + Math.sin(frames*0.2)*5); ctx.stroke();
            } 
            else if (this.type === 'moto_rat') {
                // Мопед
                ctx.fillStyle = "#c0392b"; ctx.fillRect(10, -20, 60, 15);
                ctx.fillStyle = "#2c3e50"; ctx.beginPath(); ctx.arc(20, -5, 12, 0, Math.PI*2); ctx.arc(60, -5, 12, 0, Math.PI*2); ctx.fill();
                // Крыса в шлеме
                ctx.fillStyle = "#333"; ctx.beginPath(); ctx.ellipse(40, -35, 20, 10, Math.PI/6, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#f1c40f"; ctx.beginPath(); ctx.arc(30, -40, 10, Math.PI, 0); ctx.fill(); // каска
            }
            else if (this.type === 'roach') {
                ctx.fillStyle = "#5c4033";
                ctx.beginPath(); ctx.ellipse(20, -15, 20, 10, 0, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = "rgba(255,255,255,0.5)"; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(10,-25); ctx.lineTo(-10,-35); ctx.moveTo(15,-25); ctx.lineTo(0,-40); ctx.stroke(); // крылья
                ctx.strokeStyle = "#000"; ctx.beginPath(); ctx.moveTo(5,-15); ctx.lineTo(-15,-5); ctx.stroke(); // усы
            }
            else if (this.type === 'pho') {
                // Миска Фо
                ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(15, -10, 15, 0, Math.PI); ctx.fill();
                ctx.strokeStyle = "#3498db"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(30, -10); ctx.stroke();
                // Зелень
                ctx.fillStyle = "#2ecc71"; ctx.fillRect(10, -15, 10, 5);
                // Палочки
                ctx.strokeStyle = "#8e44ad"; ctx.beginPath(); ctx.moveTo(5, 0); ctx.lineTo(25, -20); ctx.stroke();
            }
            
            ctx.restore();
        }
    }

    // --- ФОН И ДЕКОРАЦИИ ВЬЕТНАМА ---
    function initDecorations() {
        for(let i=0; i<5; i++) {
            decorations.push({ x: i * 300, y: groundY, type: 'palm' });
            decorations.push({ x: i * 400 + 150, y: 50, type: 'lanterns' });
        }
    }

    function drawBackground() {
        // Солнце
        ctx.fillStyle = "#ffd700";
        ctx.beginPath(); ctx.arc(800, 150, 60, 0, Math.PI*2); ctx.fill();
        
        // Далекие горы (бухта Халонг)
        ctx.fillStyle = "#564d65";
        ctx.beginPath();
        ctx.moveTo(0, groundY);
        for(let i=0; i<canvas.width; i+=100) {
            ctx.lineTo(i, groundY - 100 - Math.sin((i+frames*0.1)*0.01)*50);
            ctx.lineTo(i+50, groundY - 150 - Math.cos((i+frames*0.1)*0.02)*70);
        }
        ctx.lineTo(canvas.width, groundY);
        ctx.fill();

        // Декорации (Пальмы и Фонарики)
        decorations.forEach(dec => {
            dec.x -= gameSpeed * 0.5;
            if (dec.x < -200) dec.x = canvas.width + 100;
            
            ctx.save(); ctx.translate(dec.x, dec.y);
            if (dec.type === 'palm') {
                ctx.fillStyle = "#3e2723"; ctx.fillRect(-5, -150, 10, 150);
                ctx.fillStyle = "#1b5e20";
                for(let j=0; j<5; j++) {
                    ctx.beginPath(); ctx.ellipse(0, -150, 40, 10, (j*Math.PI/2.5) + Math.sin(frames*0.05)*0.1, 0, Math.PI*2); ctx.fill();
                }
            } else if (dec.type === 'lanterns') {
                ctx.strokeStyle = "#222"; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(-100, 0); ctx.quadraticCurveTo(50, 30, 200, 0); ctx.stroke();
                // Фонарики
                ctx.fillStyle = "#e74c3c"; ctx.fillRect(0, 15, 15, 20); ctx.fillStyle="#f1c40f"; ctx.fillRect(0, 35, 15, 5);
                ctx.fillStyle = "#f1c40f"; ctx.fillRect(100, 12, 15, 20); ctx.fillStyle="#e74c3c"; ctx.fillRect(100, 32, 15, 5);
            }
            ctx.restore();
        });

        // Земля
        ctx.fillStyle = "#8b5a2b"; ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
        ctx.fillStyle = "#2ecc71"; ctx.fillRect(0, groundY, canvas.width, 10);
    }

    // --- УПРАВЛЕНИЕ ИГРОЙ ---
    function selectSkin(skin) {
        currentSkin = skin;
        document.querySelectorAll('.skin-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('skin-' + skin).classList.add('active');
    }

    function startGame() {
        initAudio();
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('gameover').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        
        entities = []; particles = []; decorations = [];
        initDecorations();
        
        score = 0; phoCount = 0; frames = 0; gameSpeed = 7;
        player.y = groundY; player.dy = 0;
        isPlaying = true;
        
        document.getElementById('score').innerText = score;
        document.getElementById('pho').innerText = phoCount;
        
        if (!frames) loop(); // Запуск цикла если не запущен
    }

    function gameOver() {
        isPlaying = false;
        playSound('hit');
        cameraShake = 20;
        
        setTimeout(() => {
            document.getElementById('hud').classList.add('hidden');
            document.getElementById('gameover').classList.remove('hidden');
            document.getElementById('final-score').innerText = score + (phoCount * 50);
        }, 500);
    }

    // Обработка ввода
    window.addEventListener('keydown', (e) => { if(e.code === 'Space') { e.preventDefault(); if(isPlaying) player.jump(); }});
    window.addEventListener('mousedown', () => { if(isPlaying) player.jump(); });
    window.addEventListener('touchstart', (e) => { e.preventDefault(); if(isPlaying) player.jump(); }, {passive: false});

    // --- ГЛАВНЫЙ ЦИКЛ ---
    function loop() {
        if (cameraShake > 0) {
            ctx.save();
            ctx.translate((Math.random()-0.5)*cameraShake, (Math.random()-0.5)*cameraShake);
            cameraShake *= 0.9;
            if(cameraShake < 0.5) cameraShake = 0;
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (isPlaying) {
            frames++;
            score++;
            if (frames % 10 === 0) document.getElementById('score').innerText = score;
            
            // Спавн сущностей
            if (frames % Math.max(60, 120 - gameSpeed*2) === 0) {
                const rand = Math.random();
                if (rand < 0.2) entities.push(new Entity('pho'));
                else if (rand < 0.5) entities.push(new Entity('roach'));
                else if (rand < 0.8) entities.push(new Entity('rat'));
                else entities.push(new Entity('moto_rat'));
            }
            
            if (frames % 500 === 0) gameSpeed += 0.5; // Ускорение
        }

        drawBackground();
        
        // Отрисовка и обновление сущностей
        for (let i = entities.length - 1; i >= 0; i--) {
            if(isPlaying) entities[i].update();
            entities[i].draw();
            if (entities[i].markedForDeletion) entities.splice(i, 1);
        }

        // Частицы
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx; p.y += p.vy; p.life -= 0.05; p.size *= 0.95;
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life > 0 ? p.life : 0;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1;
            if (p.life <= 0) particles.splice(i, 1);
        }

        player.update();
        player.draw();

        if (cameraShake > 0) ctx.restore();

        requestAnimationFrame(loop);
    }

    // Первоначальная отрисовка меню (запуск статичного фона)
    initDecorations();
    drawBackground();
    player.draw();

</script>
</body>
</html>
