<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АРИНА В ДАНАНГЕ: 10/10 ULTIMATE EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Press Start 2P', cursive; color: #fff; user-select: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        #game-container::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0) 60%, rgba(0,0,0,0.6) 100%);
            pointer-events: none; z-index: 20;
        }
        canvas { 
            border: 2px solid #333; border-radius: 8px; 
            box-shadow: 0 0 50px rgba(0, 255, 204, 0.3); 
            transition: filter 0.1s;
        }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 30; transition: opacity 0.4s ease; }
        .hidden { opacity: 0; pointer-events: none; display: none !important; }
        h1 { color: #00ffcc; text-shadow: 4px 4px 0 #ff0055, 0 0 20px #00ffcc; font-size: 36px; text-align: center; line-height: 1.6; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .btn { 
            background: transparent; border: 4px solid #00ffcc; color: #00ffcc; 
            padding: 15px 35px; font-family: inherit; font-size: 18px; cursor: pointer; 
            text-transform: uppercase; transition: all 0.2s; 
            box-shadow: inset 0 0 10px rgba(0,255,204,0.2), 0 0 15px rgba(0,255,204,0.4); margin: 10px; 
        }
        .btn:hover { background: #00ffcc; color: #000; box-shadow: 0 0 30px #00ffcc; transform: scale(1.05); }
        .btn:active { transform: scale(0.95); }
        
        #hud { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 50px; z-index: 15; font-size: 20px; text-shadow: 3px 3px 0 #000; }
        .hud-item { color: #fff; }
        .hud-item span { color: #ff0055; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="hud" class="hidden">
            <div class="hud-item">СЧЕТ: <span id="score" style="color:#00ffcc">0</span></div>
            <div class="hud-item">ФО-БО: <span id="pho">0</span></div>
        </div>
        <canvas id="gameCanvas" width="1000" height="500"></canvas>
        
        <div id="menu" class="overlay">
            <h1>АРИНА В ДАНАНГЕ<br><span style="font-size: 18px; color: #ff0055; text-shadow: 2px 2px 0 #fff;">ULTIMATE EDITION</span></h1>
            <p style="color: #aaa; margin: 20px 0; font-size: 12px; line-height: 1.8; text-align: center;">
                КЛИК / ПРОБЕЛ — Прыжок<br>ДАБЛ-КЛИК — Двойной прыжок (Рывок!)<br>Уворачивайся от Ninja Lead и собирай Фо-Бо!
            </p>
            <button class="btn" onclick="startGame()">ПОГНАЛИ</button>
        </div>

        <div id="gameover" class="overlay hidden">
            <h1 style="color: #ff0055; text-shadow: 4px 4px 0 #000;">ТЕБЯ СБИЛИ!</h1>
            <h2 style="color: white; margin-bottom: 40px; font-size: 20px;">ИТОГ: <span id="final-score" style="color: #00ffcc;">0</span></h2>
            <button class="btn" onclick="startGame()">ЕЩЕ РАЗ</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    
    // ==========================================
    // ССЫЛКА НА ФОТО АРИНЫ
    // ==========================================
    const imgArina = new Image();
    imgArina.crossOrigin = "Anonymous";
    imgArina.src = 'https://i.ibb.co/LXXfpvVd/photo-2026-03-22-19-42-32-removebg-preview.png'; 

    // Core variables
    let frames = 0, score = 0, phoCount = 0, gameSpeed = 7.5, isPlaying = false;
    let entities = [], particles = [], trails = [], buildings = [];
    const groundY = 430;
    
    // Game Feel variables
    let cameraShake = 0;
    let hitStop = 0; 
    let timeOfDay = 0; 

    // --- Audio System ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); }

    function playSound(type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode); gainNode.connect(audioCtx.destination);

        if (type === 'jump') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(400, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(700, audioCtx.currentTime + 0.15);
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        } else if (type === 'dash') {
            osc.type = 'square'; osc.frequency.setValueAtTime(800, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(300, audioCtx.currentTime + 0.2);
            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime); gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        } else if (type === 'coin') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(1200, audioCtx.currentTime); osc.frequency.setValueAtTime(1800, audioCtx.currentTime + 0.05);
            gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'hit') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.4);
            gainNode.gain.setValueAtTime(0.6, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        }
    }

    // --- Player (Arina) ---
    const player = {
        x: 120, y: groundY, w: 60, h: 140, // Настроил размеры для пропорций фото
        dy: 0, gravity: 0.85, jumpPower: -14, jumps: 0, maxJumps: 2,
        
        draw(ctxRef = ctx, isTrail = false) {
            ctxRef.save();
            ctxRef.translate(this.x, this.y);
            
            if (isTrail) {
                ctxRef.globalAlpha = 0.4;
                ctxRef.globalCompositeOperation = "screen";
            }

            // Легкий наклон при прыжке/беге
            if (this.y < groundY) ctxRef.rotate(-0.05);
            else ctxRef.rotate(Math.sin(frames * 0.4) * 0.03);
            
            // Рисуем загруженную фотографию Арины
            if (imgArina.complete && imgArina.naturalWidth !== 0) {
                // Сдвигаем картинку, чтобы ноги касались земли (groundY)
                ctxRef.drawImage(imgArina, -10, -this.h, this.w + 20, this.h);
            } 
            else {
                // Заглушка, если картинка не загрузилась
                ctxRef.fillStyle = "#ff0055";
                ctxRef.fillRect(0, -this.h, this.w, this.h);
            }

            ctxRef.restore();
        },
        
        update() {
            this.dy += this.gravity;
            this.y += this.dy;
            
            if (this.y >= groundY) {
                this.y = groundY; this.dy = 0; this.jumps = 0;
                if (frames % 4 === 0 && isPlaying) createParticle(this.x + 10, this.y, "#654321", 1);
            }
            if (this.jumps === 2 && frames % 2 === 0) trails.push({ x: this.x, y: this.y, life: 1 });
        },
        
        jump() {
            initAudio();
            if (this.jumps < this.maxJumps) {
                this.dy = this.jumpPower; this.jumps++;
                if (this.jumps === 1) playSound('jump');
                else {
                    playSound('dash'); this.dy = this.jumpPower * 0.9;
                    for(let i=0; i<8; i++) createParticle(this.x + 20, this.y - 40, "#00ffcc", 2);
                }
            }
        }
    };

    // --- Particles & Trails ---
    function createParticle(x, y, color, type=1) {
        particles.push({
            x, y, color, type, vx: (Math.random() - 0.5) * 5, vy: (Math.random() - 1) * 5,
            life: 1, size: Math.random() * 5 + 2
        });
    }

    // --- Enemies ---
    class Entity {
        constructor(type) {
            this.type = type; this.x = canvas.width + 50; this.markedForDeletion = false;
            
            if (type === 'ninja_lead') { this.w = 70; this.h = 60; this.y = groundY; this.speed = gameSpeed + 3; } 
            else if (type === 'rat') { this.w = 50; this.h = 25; this.y = groundY; this.speed = gameSpeed + 1.5; } 
            else if (type === 'roach') { this.w = 35; this.h = 25; this.y = groundY - 60 - Math.random() * 60; this.speed = gameSpeed + 2; this.angle = frames; } 
            else if (type === 'pho') { this.w = 30; this.h = 30; this.y = groundY - 50 - Math.random() * 90; this.speed = gameSpeed; }
        }
        
        update() {
            this.x -= this.speed;
            if (this.type === 'roach') this.y += Math.sin(this.x * 0.05) * 4;
            if (this.x + this.w < -50) this.markedForDeletion = true;
            
            let hitboxOffset = 15; // Прощаем небольшие касания
            if (player.x + hitboxOffset < this.x + this.w && player.x + player.w - hitboxOffset > this.x &&
                player.y - player.h + hitboxOffset < this.y && player.y > this.y - this.h + hitboxOffset) {
                
                if (this.type === 'pho') {
                    phoCount++; score += 50; document.getElementById('pho').innerText = phoCount;
                    playSound('coin'); for(let i=0; i<15; i++) createParticle(this.x, this.y, "#2ecc71", 1);
                    this.markedForDeletion = true;
                } else {
                    hitStop = 15; gameOver();
                }
            }
        }
        
        draw() {
            ctx.save(); ctx.translate(this.x, this.y);
            
            if (this.type === 'ninja_lead') {
                ctx.fillStyle = "#e67e22"; ctx.beginPath(); ctx.roundRect(0, -25, 60, 20, 5); ctx.fill();
                ctx.fillStyle = "#222"; ctx.beginPath(); ctx.arc(15, -5, 12, 0, Math.PI*2); ctx.arc(55, -5, 12, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#9b59b6"; ctx.beginPath(); ctx.moveTo(25, -25); ctx.lineTo(35, -55); ctx.lineTo(55, -50); ctx.lineTo(50, -25); ctx.fill();
                ctx.fillStyle = "#fff"; ctx.fillRect(35, -50, 15, 10); ctx.fillStyle = "#000"; ctx.fillRect(45, -48, 5, 3);
                if(frames % 10 < 5) { ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.beginPath(); ctx.moveTo(-10, -10); ctx.lineTo(0, -5); ctx.lineTo(-10, 0); ctx.fill(); }
            } 
            else if (this.type === 'rat') {
                ctx.fillStyle = "#2c3e50"; ctx.beginPath(); ctx.ellipse(25, -12, 25, 12, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#e74c3c"; ctx.fillRect(10, -16, 4, 3);
                ctx.strokeStyle = "#e84393"; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(50, -12); ctx.lineTo(70, -12 + Math.sin(frames*0.3)*8); ctx.stroke();
            }
            else if (this.type === 'roach') {
                ctx.fillStyle = "#634832"; ctx.beginPath(); ctx.ellipse(17, -12, 17, 10, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "rgba(200,255,255,0.6)"; let wingFlap = Math.sin(frames * 1.5) * 10;
                ctx.beginPath(); ctx.ellipse(10, -20 + wingFlap, 12, 6, Math.PI/4, 0, Math.PI*2); ctx.fill();
            }
            else if (this.type === 'pho') {
                ctx.fillStyle = "#ecf0f1"; ctx.beginPath(); ctx.arc(15, -10, 15, 0, Math.PI); ctx.fill();
                ctx.strokeStyle = "#3498db"; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(30, -10); ctx.stroke();
                ctx.fillStyle = "#2ecc71"; ctx.fillRect(8, -15, 14, 6);
                ctx.strokeStyle = "#e67e22"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(5, -5); ctx.lineTo(25, -25); ctx.moveTo(10, -5); ctx.lineTo(30, -25); ctx.stroke();
            }
            ctx.restore();
        }
    }

    // --- Dynamic Background (Da Nang) ---
    function drawBackground() {
        let r1 = Math.floor(135 - timeOfDay * 125); let g1 = Math.floor(206 - timeOfDay * 190); let b1 = Math.floor(235 - timeOfDay * 150);
        let r2 = Math.floor(255 - timeOfDay * 230); let g2 = Math.floor(180 - timeOfDay * 150); let b2 = Math.floor(123 - timeOfDay * 100);
        let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, `rgb(${r1},${g1},${b1})`); grad.addColorStop(1, `rgb(${r2},${g2},${b2})`);
        ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = timeOfDay < 0.5 ? "#ffd700" : "#f1c40f";
        let celestialY = 150 + timeOfDay * 200;
        ctx.beginPath(); ctx.arc(800, celestialY, 50, 0, Math.PI*2); ctx.fill();

        ctx.fillStyle = `rgb(${40 - timeOfDay*30}, ${40 - timeOfDay*30}, ${50 - timeOfDay*30})`;
        buildings.forEach(b => {
            b.x -= gameSpeed * 0.2;
            if (b.x < -100) { b.x = canvas.width + 100; b.h = 100 + Math.random() * 150; }
            ctx.fillRect(b.x, groundY - b.h, b.w, b.h);
            if (timeOfDay > 0.5) {
                ctx.fillStyle = Math.random() > 0.1 ? "#f1c40f" : "#333";
                ctx.fillRect(b.x + 10, groundY - b.h + 20, 10, 10);
                ctx.fillStyle = `rgb(${40 - timeOfDay*30}, ${40 - timeOfDay*30}, ${50 - timeOfDay*30})`;
            }
        });

        // Dragon Bridge (Cầu Rồng)
        let bridgeOffset = (frames * gameSpeed * 0.4) % 600;
        ctx.strokeStyle = "#f39c12"; ctx.lineWidth = 12; ctx.beginPath();
        for(let i=-600; i<canvas.width+600; i+=600) {
            let x = i - bridgeOffset; ctx.moveTo(x, groundY); ctx.quadraticCurveTo(x + 300, groundY - 200, x + 600, groundY);
        }
        ctx.stroke();
        let headX = canvas.width - bridgeOffset % 600;
        ctx.fillStyle = "#f39c12"; ctx.beginPath(); ctx.moveTo(headX, groundY-50); ctx.lineTo(headX+60, groundY-80); ctx.lineTo(headX+40, groundY-20); ctx.fill();
        ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(headX+45, groundY-60, 4, 0, Math.PI*2); ctx.fill();
        if (timeOfDay > 0.7 && frames % 10 < 5) {
            ctx.fillStyle = "#e74c3c"; ctx.beginPath(); ctx.arc(headX+70, groundY-70, Math.random()*20+10, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#f1c40f"; ctx.beginPath(); ctx.arc(headX+80, groundY-70, Math.random()*10+5, 0, Math.PI*2); ctx.fill();
        }

        ctx.fillStyle = `rgb(${50 - timeOfDay*40}, ${50 - timeOfDay*40}, ${50 - timeOfDay*40})`; 
        ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
        ctx.fillStyle = "#00ffcc"; ctx.fillRect(0, groundY, canvas.width, 3);
    }

    function startGame() {
        initAudio();
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('gameover').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        canvas.style.filter = "none";
        
        entities = []; particles = []; trails = []; buildings = [];
        for(let i=0; i<15; i++) buildings.push({ x: i * 80, w: 60, h: 100 + Math.random()*150 });
        
        score = 0; phoCount = 0; frames = 0; gameSpeed = 8; timeOfDay = 0;
        player.y = groundY; player.dy = 0; player.jumps = 0;
        isPlaying = true; hitStop = 0;
        
        document.getElementById('score').innerText = score;
        document.getElementById('pho').innerText = phoCount;
        
        if (!window.loopRunning) loop(); 
    }

    function gameOver() {
        isPlaying = false; playSound('hit'); cameraShake = 30; 
        canvas.style.filter = "grayscale(100%) contrast(150%)"; 
        
        setTimeout(() => {
            document.getElementById('hud').classList.add('hidden');
            document.getElementById('gameover').classList.remove('hidden');
            document.getElementById('final-score').innerText = score + (phoCount * 100);
        }, 1200); 
    }

    function handleInput() { if(isPlaying && hitStop <= 0) player.jump(); }
    window.addEventListener('keydown', (e) => { if(e.code === 'Space') { e.preventDefault(); handleInput(); }});
    window.addEventListener('mousedown', handleInput);
    window.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(); }, {passive: false});

    function loop() {
        window.loopRunning = true;
        
        if (hitStop > 0) { hitStop--; requestAnimationFrame(loop); return; }

        if (cameraShake > 0) {
            ctx.save(); ctx.translate((Math.random()-0.5)*cameraShake, (Math.random()-0.5)*cameraShake);
            cameraShake *= 0.85; if(cameraShake < 0.5) cameraShake = 0;
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (isPlaying) {
            frames++; score++;
            if (frames % 5 === 0) document.getElementById('score').innerText = score;
            timeOfDay = Math.min(1, frames / 3000); 
            
            if (frames % Math.max(50, 100 - Math.floor(gameSpeed*1.5)) === 0) {
                const rand = Math.random();
                if (rand < 0.2) entities.push(new Entity('pho'));
                else if (rand < 0.45) entities.push(new Entity('roach'));
                else if (rand < 0.75) entities.push(new Entity('rat'));
                else entities.push(new Entity('ninja_lead'));
            }
            if (frames % 400 === 0) gameSpeed += 0.4; 
        }

        drawBackground();
        
        for (let i = trails.length - 1; i >= 0; i--) {
            let t = trails[i]; t.life -= 0.1;
            if (t.life <= 0) trails.splice(i, 1);
            else {
                ctx.globalAlpha = t.life * 0.5;
                player.draw({
                    ...ctx, save: ctx.save.bind(ctx), restore: ctx.restore.bind(ctx), translate: (x,y) => ctx.translate(t.x, t.y),
                    rotate: ctx.rotate.bind(ctx), fillStyle: "#00ffcc", fill: ctx.fill.bind(ctx), stroke: ctx.stroke.bind(ctx), beginPath: ctx.beginPath.bind(ctx), arc: ctx.arc.bind(ctx), ellipse: ctx.ellipse.bind(ctx), roundRect: ctx.roundRect.bind(ctx), moveTo: ctx.moveTo.bind(ctx), lineTo: ctx.lineTo.bind(ctx), quadraticCurveTo: ctx.quadraticCurveTo.bind(ctx), drawImage: ctx.drawImage.bind(ctx)
                }, true);
                ctx.globalAlpha = 1;
            }
        }

        for (let i = entities.length - 1; i >= 0; i--) {
            if(isPlaying) entities[i].update();
            entities[i].draw();
            if (entities[i].markedForDeletion) entities.splice(i, 1);
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.04;
            if (p.type === 2) p.size *= 0.9; 
            ctx.fillStyle = p.color; ctx.globalAlpha = Math.max(0, p.life);
            ctx.beginPath(); ctx.fillRect(p.x, p.y, p.size, p.size); ctx.globalAlpha = 1;
            if (p.life <= 0) particles.splice(i, 1);
        }

        player.update(); player.draw();
        if (cameraShake > 0) ctx.restore();
        requestAnimationFrame(loop);
    }

    for(let i=0; i<15; i++) buildings.push({ x: i * 80, w: 60, h: 100 + Math.random()*150 });
    drawBackground(); player.draw();
</script>
</body>
</html>
