<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARINA: VIETNAM OVERDRIVE 12/10</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Press Start 2P', cursive; color: #fff; user-select: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background: #000; }
        #game-container::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0) 40%, rgba(0,0,0,0.8) 100%);
            pointer-events: none; z-index: 20;
        }
        canvas { border: 2px solid #333; border-radius: 10px; box-shadow: 0 0 60px rgba(0, 255, 204, 0.4); }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 30; transition: opacity 0.5s; }
        .hidden { opacity: 0; pointer-events: none; display: none !important; }
        h1 { color: #00ffcc; text-shadow: 4px 4px 0 #ff0055, 0 0 20px #00ffcc; font-size: 32px; text-align: center; line-height: 1.6; }
        .btn { background: transparent; border: 4px solid #00ffcc; color: #00ffcc; padding: 20px 40px; font-family: inherit; font-size: 18px; cursor: pointer; text-transform: uppercase; margin: 10px; transition: 0.2s; box-shadow: 0 0 15px rgba(0,255,204,0.3); }
        .btn:hover { background: #00ffcc; color: #000; box-shadow: 0 0 40px #00ffcc; transform: scale(1.05); }
        #hud { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 40px; z-index: 25; font-size: 16px; text-shadow: 2px 2px 0 #000; }
        .hint { color: #666; font-size: 10px; margin-top: 20px; text-align: center; line-height: 2; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="hud" class="hidden">
            <div>SCORE: <span id="score" style="color:#00ffcc">0</span></div>
            <div>COMBO: <span id="combo" style="color:#ff0055">x1</span></div>
        </div>
        <canvas id="gameCanvas" width="1000" height="500"></canvas>
        
        <div id="menu" class="overlay">
            <h1>ARINA: DANANG DRIFT<br><span style="font-size: 14px; color: #fff;">VERSION 12/10 - HARDCORE</span></h1>
            <button class="btn" onclick="startGame()">START MISSION</button>
            <div class="hint">
                [SPACE/UP] - JUMP / DOUBLE JUMP<br>
                [DOWN/S/SHIFT] - SLIDE (UNDER WIRES)<br>
                COLLECT PHO COINS TO CHARGE COMBO
            </div>
        </div>

        <div id="gameover" class="overlay hidden">
            <h1 style="color: #ff0055;">WASTED</h1>
            <h2 style="font-size: 16px;">SCORE: <span id="final-score" style="color: #00ffcc;">0</span></h2>
            <button class="btn" onclick="startGame()">RETRY</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // Изображение Арины (твоя ссылка)
    const imgArina = new Image();
    imgArina.crossOrigin = "Anonymous";
    imgArina.src = 'https://i.ibb.co/LXXfpvVd/photo-2026-03-22-19-42-32-removebg-preview.png';

    // Состояния и переменные
    let frames = 0, score = 0, combo = 1, comboTimer = 0, gameSpeed = 8, isPlaying = false;
    let entities = [], particles = [], trails = [], buildings = [], floatTexts = [];
    const groundY = 420;
    let cameraShake = 0, timeOfDay = 0, flashAlpha = 0;

    const keys = { up: false, down: false };

    // --- Audio Engine ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); }

    function playSound(freq, type, duration, vol) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        if (type === 'sawtooth') osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + duration);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    // --- Player Logic ---
    const player = {
        x: 120, y: groundY, baseW: 80, baseH: 170,
        w: 80, h: 170, dy: 0, gravity: 0.85, jumpPower: -15, jumps: 0,
        isDucking: false, slideTime: 0,
        
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            
            // Визуализация приседания
            let scaleY = this.isDucking ? 0.5 : 1.0;
            let scaleX = this.isDucking ? 1.3 : 1.0;
            let drawH = this.baseH * scaleY;
            let drawW = this.baseW * scaleX;

            if (this.y < groundY) ctx.rotate(-0.05);
            else if (this.isDucking) ctx.rotate(0.1);
            else ctx.rotate(Math.sin(frames * 0.4) * 0.03);

            if (imgArina.complete && imgArina.naturalWidth !== 0) {
                // Отрисовка фото
                ctx.drawImage(imgArina, -drawW/4, -drawH, drawW, drawH);
            } else {
                // Геометрическая моделька (на случай ошибки загрузки)
                ctx.fillStyle = "#ff0055";
                ctx.fillRect(0, -drawH, drawW/2, drawH);
            }
            ctx.restore();
        },
        
        update() {
            // Механика приседания/слайда
            if (keys.down) {
                if (!this.isDucking && this.y >= groundY) {
                    playSound(200, 'sine', 0.2, 0.2);
                }
                this.isDucking = true;
                this.h = this.baseH * 0.5;
                if (this.y >= groundY && frames % 2 === 0) {
                    createParticle(this.x + 10, this.y, "#ff0055", 2);
                }
            } else {
                this.isDucking = false;
                this.h = this.baseH;
            }

            this.dy += this.gravity;
            this.y += this.dy;
            
            if (this.y >= groundY) {
                this.y = groundY; this.dy = 0; this.jumps = 0;
                if (frames % 5 === 0 && !this.isDucking) createParticle(this.x + 10, this.y, "#444", 1);
            }

            // Шлейф при прыжке
            if (this.jumps > 0 && frames % 2 === 0) {
                trails.push({ x: this.x, y: this.y, h: this.h, w: this.w, life: 1, ducking: this.isDucking });
            }
        },
        
        jump() {
            if (this.jumps < 2 && !this.isDucking) {
                this.dy = this.jumpPower;
                this.jumps++;
                playSound(400 + (this.jumps * 100), 'square', 0.1, 0.2);
                if (this.jumps === 2) {
                    flashAlpha = 0.3;
                    cameraShake = 15;
                    for(let i=0; i<10; i++) createParticle(this.x + 40, this.y - 80, "#00ffcc", 2);
                }
            }
        }
    };

    // --- Entities ---
    class Entity {
        constructor(type) {
            this.type = type;
            this.x = canvas.width + 100;
            this.markedForDeletion = false;
            this.speed = gameSpeed + (Math.random() * 3);
            
            if (type === 'rat') { this.w = 70; this.h = 40; this.y = groundY; this.color = "#333"; }
            else if (type === 'ninja') { this.w = 90; this.h = 80; this.y = groundY; this.speed += 4; this.color = "#ff0055"; }
            else if (type === 'wire') { this.w = 120; this.h = 25; this.y = groundY - 110; this.speed = gameSpeed; this.color = "#00ffcc"; }
            else if (type === 'pho') { this.w = 40; this.h = 40; this.y = groundY - 70 - Math.random()*120; this.color = "#ffe600"; }
        }
        
        update() {
            this.x -= this.speed;
            if (this.x + this.w < -100) this.markedForDeletion = true;

            // Коллизия (хитбокс уменьшен для честности)
            let pTop = player.y - player.h;
            let eTop = this.y - this.h;
            let margin = 15;
            
            if (player.x + margin < this.x + this.w && player.x + player.w - margin > this.x &&
                pTop + margin < this.y && player.y - margin > eTop) {
                
                if (this.type === 'pho') {
                    let gain = 100 * combo;
                    score += gain;
                    comboTimer = 120;
                    if (score % 1000 === 0) combo++;
                    spawnFloatText("+" + gain, this.x, this.y - 50);
                    playSound(800, 'sine', 0.1, 0.2);
                    this.markedForDeletion = true;
                } else {
                    gameOver();
                }
            }
        }
        
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.shadowBlur = 15; ctx.shadowColor = this.color;
            ctx.fillStyle = this.color;
            
            if (this.type === 'wire') {
                ctx.fillRect(0, -this.h, this.w, this.h);
                ctx.fillStyle = "#fff"; ctx.globalAlpha = 0.5;
                ctx.fillRect(0, -this.h + 5, this.w, 2);
            } else if (this.type === 'pho') {
                ctx.beginPath(); ctx.arc(20, -20, 20, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#000"; ctx.font = "12px Arial"; ctx.fillText("🍜", 10, -12);
            } else {
                ctx.fillRect(0, -this.h, this.w, this.h);
                ctx.fillStyle = "#fff"; ctx.fillRect(this.w-15, -this.h+5, 8, 8); // Глаз
            }
            ctx.restore();
        }
    }

    // --- Background Systems ---
    function initWorld() {
        buildings = [];
        for(let i=0; i<10; i++) buildings.push({ x: i*150, w: 80 + Math.random()*100, h: 100 + Math.random()*200 });
    }

    function drawWorld() {
        // Sky
        let skyGrad = ctx.createLinearGradient(0,0,0, canvas.height);
        skyGrad.addColorStop(0, `rgb(${20 - timeOfDay*15}, ${10 - timeOfDay*10}, ${40 - timeOfDay*30})`);
        skyGrad.addColorStop(1, "#050505");
        ctx.fillStyle = skyGrad; ctx.fillRect(0,0, canvas.width, canvas.height);

        // Золотой мост (Hands)
        ctx.fillStyle = "#444";
        ctx.save();
        ctx.translate(canvas.width/2 - (frames*0.5)%2000, 300);
        // Рисуем абстрактную руку
        ctx.beginPath(); ctx.moveTo(0, 100); ctx.quadraticCurveTo(50, -150, 100, 100); ctx.fill();
        ctx.fillStyle = "#f39c12"; ctx.fillRect(0, 0, 1000, 10); // Дорога моста
        ctx.restore();

        // Buildings (Parallax)
        ctx.fillStyle = "#111";
        buildings.forEach(b => {
            b.x -= gameSpeed * 0.3;
            if (b.x < -200) b.x = canvas.width + 100;
            ctx.fillRect(b.x, groundY - b.h, b.w, b.h);
            ctx.fillStyle = Math.random() > 0.9 ? "#00ffcc" : "#222";
            ctx.fillRect(b.x + 10, groundY - b.h + 20, 10, 10);
            ctx.fillStyle = "#111";
        });

        // Ground
        ctx.fillStyle = "#0a0a0a"; ctx.fillRect(0, groundY, canvas.width, 100);
        ctx.fillStyle = "#00ffcc"; ctx.shadowBlur = 20; ctx.shadowColor = "#00ffcc";
        ctx.fillRect(0, groundY, canvas.width, 4);
        ctx.shadowBlur = 0;
    }

    // --- Helpers ---
    function createParticle(x, y, color, type) {
        particles.push({ x, y, color, type, vx: (Math.random()-0.5)*8, vy: (Math.random()-1)*8, life: 1, s: Math.random()*5+2 });
    }

    function spawnFloatText(t, x, y) {
        floatTexts.push({ t, x, y, life: 1 });
    }

    // --- Input ---
    window.addEventListener('keydown', e => {
        initAudio();
        if (e.code === 'ArrowUp' || e.code === 'Space') { e.preventDefault(); player.jump(); }
        if (e.code === 'ArrowDown' || e.code === 'KeyS' || e.code === 'ShiftLeft') { keys.down = true; }
    });
    window.addEventListener('keyup', e => {
        if (e.code === 'ArrowDown' || e.code === 'KeyS' || e.code === 'ShiftLeft') { keys.down = false; }
    });

    // --- Game States ---
    function startGame() {
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('gameover').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        score = 0; combo = 1; frames = 0; gameSpeed = 8; entities = []; particles = []; floatTexts = [];
        isPlaying = true;
        initWorld();
        requestAnimationFrame(loop);
    }

    function gameOver() {
        isPlaying = false;
        playSound(100, 'sawtooth', 0.5, 0.4);
        cameraShake = 30;
        document.getElementById('gameover').classList.remove('hidden');
        document.getElementById('final-score').innerText = score;
    }

    // --- Main Loop ---
    function loop() {
        if (!isPlaying) return;

        // Camera Shake logic
        ctx.save();
        if (cameraShake > 0) {
            ctx.translate((Math.random()-0.5)*cameraShake, (Math.random()-0.5)*cameraShake);
            cameraShake *= 0.9;
        }

        frames++;
        timeOfDay = Math.min(1, frames/10000);
        if (comboTimer > 0) comboTimer--; else combo = 1;

        drawWorld();

        // Spawn logic
        if (frames % Math.max(40, 90 - Math.floor(gameSpeed)) === 0) {
            let r = Math.random();
            if (r < 0.2) entities.push(new Entity('pho'));
            else if (r < 0.5) entities.push(new Entity('rat'));
            else if (r < 0.8) entities.push(new Entity('ninja'));
            else entities.push(new Entity('wire'));
        }
        if (frames % 1000 === 0) gameSpeed += 0.5;

        // Trails
        trails.forEach((t, i) => {
            t.life -= 0.05;
            ctx.globalAlpha = t.life * 0.3;
            ctx.fillStyle = "#00ffcc";
            let h = t.ducking ? t.h : t.h;
            ctx.fillRect(t.x, t.y - h, t.w, h);
            if (t.life <= 0) trails.splice(i, 1);
        });
        ctx.globalAlpha = 1;

        // Entities
        entities.forEach((e, i) => {
            e.update(); e.draw();
            if (e.markedForDeletion) entities.splice(i, 1);
        });

        // Player
        player.update();
        player.draw();

        // Particles
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life -= 0.02;
            ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
            ctx.fillRect(p.x, p.y, p.s, p.s);
            if (p.life <= 0) particles.splice(i, 1);
        });
        ctx.globalAlpha = 1;

        // Floating Text
        floatTexts.forEach((ft, i) => {
            ft.y -= 2; ft.life -= 0.02;
            ctx.fillStyle = `rgba(0, 255, 204, ${ft.life})`;
            ctx.font = "14px 'Press Start 2P'";
            ctx.fillText(ft.t, ft.x, ft.y);
            if (ft.life <= 0) floatTexts.splice(i, 1);
        });

        // Flash effect
        if (flashAlpha > 0) {
            ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`;
            ctx.fillRect(0,0, canvas.width, canvas.height);
            flashAlpha -= 0.02;
        }

        ctx.restore();

        document.getElementById('score').innerText = score;
        document.getElementById('combo').innerText = "x" + combo;

        requestAnimationFrame(loop);
    }

    // Initial draw
    initWorld();
    drawWorld();
</script>
</body>
</html>
